<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GARIS WAKTU — Jadwal Langsir Kereta</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700;800&display=swap');

:root{
  --bg:#0a0c10; --sf:#11141a; --sf2:#181c24; --bd:#2a2f3d;
  --ac:#f0b429; --ac2:#00c2ff; --red:#ef4444; --grn:#22c55e;
  --txt:#e8eaf0; --dim:#6b7280; --gridline:#1e2330;
  --LW:72px;
  --ROW:64px;
  --HH:40px; /* header height — used by floating label offset */
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);
  font-family:'Barlow Condensed',sans-serif;touch-action:pan-x pan-y;}

/* ══ HEADER ══ */
header{
  height:48px;background:linear-gradient(135deg,#0f1218,#181c28);
  border-bottom:2px solid var(--ac);padding:0 10px;
  display:flex;align-items:center;gap:8px;flex-shrink:0;
  box-shadow:0 4px 20px rgba(0,0,0,.5);z-index:300;
}
.logo{width:24px;height:24px;flex-shrink:0;background:var(--ac);
  clip-path:polygon(0 20%,40% 0,100% 0,100% 80%,60% 100%,0 100%);}
header h1{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;
  letter-spacing:2px;color:var(--ac);text-transform:uppercase;white-space:nowrap;}
.htools{margin-left:auto;display:flex;gap:4px;align-items:center;flex-wrap:nowrap;}
#clock{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--dim);
  display:none;} /* hidden on mobile */
@media(min-width:600px){#clock{display:block;margin-right:4px;}}
#cfBadge{display:none;background:var(--red);color:#fff;font-size:10px;font-weight:700;
  letter-spacing:1px;padding:3px 8px;border-radius:20px;cursor:pointer;white-space:nowrap;
  min-height:32px;align-items:center;}
#cfBadge.show{display:flex;}
.zoom-c{display:flex;gap:2px;align-items:center;}
.zoom-l{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim);min-width:28px;text-align:center;}

/* ══ BUTTONS ══ */
.btn{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:11px;letter-spacing:1px;
  text-transform:uppercase;border:none;cursor:pointer;padding:5px 10px;border-radius:5px;
  transition:all .15s;white-space:nowrap;min-height:32px;display:inline-flex;align-items:center;justify-content:center;}
.btn-ghost{background:transparent;border:1px solid var(--bd);color:var(--dim);}
.btn-ghost:hover,.btn-ghost:active{border-color:var(--txt);color:var(--txt);}
.btn-primary{background:var(--ac);color:#0a0c10;}
.btn-primary:hover,.btn-primary:active{background:#ffca50;}
.btn-edit-toggle{background:transparent;border:1px solid var(--ac2);color:var(--ac2);}
.btn-edit-toggle:hover,.btn-edit-toggle:active,.btn-edit-toggle.active{background:var(--ac2);color:#0a0c10;}
.btn-del{background:transparent;border:1px solid var(--red);color:var(--red);}
.btn-del:hover,.btn-del:active{background:var(--red);color:#fff;}
.btn-hide{background:transparent;border:1px solid var(--dim);color:var(--dim);}
.btn-hide:hover,.btn-hide:active,.btn-hide.active{background:var(--dim);color:#0a0c10;}
.btn-sm{padding:4px 8px;font-size:10px;min-height:28px;}
.btn-icon{padding:5px 7px;font-size:14px;min-height:32px;}

/* ══ LAYOUT ══ */
/* Mobile: vertical stack (timeline top, sidebar bottom as drawer) */
/* Desktop: side by side */
.app{display:flex;height:calc(100vh - 48px);overflow:hidden;flex-direction:column;}
@media(min-width:700px){.app{flex-direction:row;}}

/* ══ LEFT — TIMELINE ══ */
.tl-wrap{flex:1;min-height:0;min-width:0;display:flex;flex-direction:column;overflow:hidden;}
.tl-scroll{
  flex:1;min-height:0;
  overflow-x:auto;
  overflow-y:auto; /* allow vertical scroll on mobile */
  position:relative;
  -webkit-overflow-scrolling:touch;
  touch-action:pan-x pan-y; /* both axes on mobile */
}
/* Big scrollbar on desktop */
.tl-scroll::-webkit-scrollbar{height:20px;}
.tl-scroll::-webkit-scrollbar-track{background:#0d1018;border-top:1px solid var(--bd);}
.tl-scroll::-webkit-scrollbar-thumb{
  background:linear-gradient(to bottom,#4a5080,#2a2f45);
  border-radius:10px;border:4px solid #0d1018;min-width:60px;
}
.tl-scroll::-webkit-scrollbar-thumb:hover{background:linear-gradient(to bottom,#6a70a0,#3a3f60);}
.tl-inner{display:flex;flex-direction:column;height:calc(100% - 20px);}

/* Hour header */
.tl-head{
  display:flex;height:var(--HH);flex-shrink:0;
  background:var(--sf);border-bottom:2px solid var(--bd);
  position:sticky;top:0;z-index:40;
}
.corner{
  width:var(--LW);min-width:var(--LW);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;letter-spacing:2px;color:var(--ac);
  border-right:2px solid var(--bd);background:var(--sf2);text-transform:uppercase;
}
#hourCells{display:flex;}
.hcell{
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-family:'Share Tech Mono',monospace;color:var(--dim);
  border-right:1px solid var(--bd);user-select:none;
}
.hcell.major{color:var(--txt);font-size:11px;}
.hcell.minor{color:var(--dim);border-right-color:var(--gridline);font-size:9px;}

/* Track rows */
.tracks-area{
  flex:1;min-height:0;overflow:hidden;
  position:relative;display:flex;flex-direction:column;
}
.track-row{
  height:var(--ROW);min-height:var(--ROW);flex-shrink:0;
  display:flex;border-bottom:1px solid var(--gridline);position:relative;overflow:visible;
}
.track-row.cuci .track-label{background:rgba(0,194,255,.07);color:var(--ac2);}
.track-label{
  width:var(--LW);min-width:var(--LW);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:11px;letter-spacing:1.2px;color:var(--ac);
  background:var(--sf2);border-right:2px solid var(--bd);
  position:sticky;left:0;z-index:10;text-transform:uppercase;
}
.track-grid{position:relative;flex:1;display:flex;overflow:visible;}
.gcell{border-right:1px solid var(--gridline);height:100%;flex-shrink:0;}
.gcell.maj{border-right-color:var(--bd);}

/* ══ BLOCKS ══ */
.ka-block{
  position:absolute;
  border-radius:4px;
  overflow:visible;
  cursor:pointer;pointer-events:all;
  border:1.5px solid rgba(255,255,255,.22);
  box-shadow:0 2px 10px rgba(0,0,0,.5);
  transition:filter .15s,box-shadow .15s,opacity .2s;z-index:5;
}
.ka-block:hover,.ka-block:active{filter:brightness(1.18);box-shadow:0 0 0 2px rgba(255,255,255,.4);z-index:20;}
.ka-block.cf{box-shadow:0 0 0 2px var(--red),0 0 10px rgba(239,68,68,.35)!important;}
.ka-block.hidden-block{opacity:0.18;pointer-events:none;}

/* ── Name label ── always at top z-index, never clipped by other blocks */
.blk-name{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  font-size:11px;font-weight:700;letter-spacing:0.3px;
  color:#fff !important;
  text-shadow:0 1px 4px rgba(0,0,0,.9), 0 0 6px rgba(0,0,0,.7);
  pointer-events:none;
  white-space:nowrap;
  overflow:visible;
  z-index:200;
  background:rgba(0,0,0,.65);
  border-radius:4px;
  padding:2px 6px;
  border:1px solid rgba(255,255,255,.25);
}
/* Floating label ABOVE block */
.blk-name.above{
  top:auto;bottom:calc(100% + 6px);
  transform:translateX(-50%);
  background:rgba(8,10,18,.95);
  border-color:rgba(255,255,255,.35);
  box-shadow:0 2px 12px rgba(0,0,0,.8);
  z-index:300;
}
.blk-name.above::after{
  content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);
  border:5px solid transparent;border-top-color:rgba(8,10,18,.95);
}
/* Floating label BELOW block (first row) */
.blk-name.below{
  top:calc(100% + 6px);bottom:auto;
  transform:translateX(-50%);
  background:rgba(8,10,18,.95);
  border-color:rgba(255,255,255,.35);
  box-shadow:0 2px 12px rgba(0,0,0,.8);
  z-index:300;
}
.blk-name.below::before{
  content:'';position:absolute;bottom:100%;left:50%;transform:translateX(-50%);
  border:5px solid transparent;border-bottom-color:rgba(8,10,18,.95);
}

/* Duration label */
.blk-dur{
  position:absolute;left:0;right:0;
  text-align:center;
  font-family:'Share Tech Mono',monospace;font-size:9px;
  color:rgba(255,255,255,.6);
  pointer-events:none;white-space:nowrap;overflow:visible;
  z-index:8;
  background:rgba(0,0,0,.55);
  border-radius:2px;
  padding:0 2px;
  /* default: just below block */
  bottom:-15px;
}

/* Timestamps outside block */
.blk-ts-l,.blk-ts-r{
  position:absolute;
  font-family:'Share Tech Mono',monospace;font-size:9px;
  color:#fff;
  text-shadow:0 1px 3px rgba(0,0,0,.8);
  white-space:nowrap;pointer-events:none;
  z-index:8; /* above SVG arrows (z=2), above blocks (z=5) */
  background:rgba(0,0,0,.82);
  border-radius:3px;
  padding:1px 3px;
}
/* jam MASUK (kiri): tampil di pojok kiri-atas blok */
.blk-ts-l{
  right:calc(100% + 2px);
  text-align:right;
  top:3px;
  bottom:auto;
}
/* jam KELUAR (kanan): tampil di pojok kanan-bawah blok */
.blk-ts-r{
  left:calc(100% + 2px);
  text-align:left;
  bottom:3px;
  top:auto;
}

/* ══ SVG ══ */
/* SVG z-index BELOW blocks/labels so names & timestamps always on top */
#arrowSvg{position:absolute;top:0;pointer-events:none;z-index:2;overflow:visible;}

/* ══ EMPTY HINT ══ */
#emptyHint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;color:var(--dim);pointer-events:none;}
#emptyHint .big{font-size:34px;opacity:.12;margin-bottom:5px;}

/* ══ TOOLTIP ══ */
.tooltip{
  position:fixed;background:#1a1f2e;border:1px solid var(--ac);
  padding:9px 13px;border-radius:6px;pointer-events:none;display:none;
  z-index:600;box-shadow:0 8px 32px rgba(0,0,0,.6);min-width:190px;font-size:13px;
}
.tooltip.show{display:block;}
.tt-name{font-size:14px;font-weight:700;color:var(--ac);margin-bottom:5px;}
.tt-row{font-size:12px;color:var(--dim);margin-bottom:2px;}
.tt-row b{color:var(--txt);font-weight:600;}
.tt-cf{color:var(--red);font-size:11px;margin-top:4px;font-weight:700;display:none;}

/* ══ CONFLICT PANEL ══ */
.cf-panel{
  position:fixed;top:56px;right:8px;width:260px;
  background:var(--sf);border:1px solid var(--red);border-radius:8px;
  padding:12px;z-index:500;display:none;
  box-shadow:0 8px 32px rgba(0,0,0,.6);
}
.cf-panel.open{display:block;}
.cf-title{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--red);margin-bottom:8px;}
.cf-item{font-size:12px;padding:4px 0;border-bottom:1px solid var(--gridline);color:var(--dim);}
.cf-item b{color:var(--txt);}

/* ══ RIGHT — SIDEBAR ══ */
.sidebar{
  width:100%;flex-shrink:0;
  background:var(--sf);border-top:2px solid var(--bd);
  display:flex;flex-direction:column;overflow:hidden;
  height:220px;
  transition:height .25s ease, width .3s ease;
}
.sidebar.expanded{height:65vh;}

@media(min-width:700px){
  .sidebar{
    width:290px;min-width:0;height:auto;
    border-top:none;border-left:2px solid var(--bd);
    position:relative;
    transition:width .3s ease;
  }
  .sidebar.collapsed-edge{
    width:28px;
  }
  .sidebar.collapsed-edge .sb-body,
  .sidebar.collapsed-edge #kaCount{
    display:none;
  }
  .sidebar.collapsed-edge .sb-head{
    flex-direction:column;
    writing-mode:vertical-rl;
    height:100%;
    justify-content:flex-start;
    padding:12px 4px;
    gap:10px;
    border-bottom:none;
    cursor:pointer;
  }
  .sidebar.collapsed-edge .sb-collapse-btn{
    writing-mode:horizontal-tb;
    transform:scaleX(-1);
  }
}

.sb-head{
  padding:8px 10px;border-bottom:1px solid var(--bd);flex-shrink:0;
  display:flex;align-items:center;gap:8px;
}
.sb-title{font-size:10px;font-weight:700;letter-spacing:2.5px;color:var(--ac);text-transform:uppercase;white-space:nowrap;}
#kaCount{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--dim);white-space:nowrap;}

/* Mobile toggle */
.sb-mobile-toggle{cursor:pointer;}
.sb-chevron{margin-left:auto;color:var(--dim);transition:transform .25s;font-size:14px;}
.sidebar.expanded .sb-chevron{transform:rotate(180deg);}
@media(min-width:700px){.sb-chevron{display:none;}}

/* Desktop collapse button */
.sb-collapse-btn{
  margin-left:auto;background:transparent;border:none;cursor:pointer;
  color:var(--dim);font-size:16px;padding:2px 4px;display:none;
  transition:transform .25s;line-height:1;
}
@media(min-width:700px){.sb-collapse-btn{display:block;}}

/* Body = scrollable area + add form */
.sb-body{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;}

/* Sidebar list: scrollable both axes */
.sb-scroll{
  flex:1;
  overflow-y:auto;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
}
.sb-scroll::-webkit-scrollbar{width:4px;height:4px;}
.sb-scroll::-webkit-scrollbar-track{background:var(--bg);}
.sb-scroll::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px;}

/* ══ KA ITEMS ══ */
.ka-item{border-bottom:1px solid var(--gridline);background:var(--sf);}
.ka-item.dragging{opacity:.35;}
.ka-item.drag-over{border-top:2px solid var(--ac);}

.ka-item-head{
  display:flex;align-items:center;gap:6px;padding:8px 10px;
  cursor:grab;min-height:44px; /* touch-friendly */
}
.ka-item-head:active{cursor:grabbing;}
.drag-handle{color:var(--dim);font-size:16px;flex-shrink:0;padding:2px;}
.ka-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.ka-item-name{font-size:13px;font-weight:700;flex:1;min-width:0;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ka-item-time{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim);flex-shrink:0;}
.ka-cf-badge{background:var(--red);color:#fff;font-size:9px;font-weight:700;
  padding:1px 5px;border-radius:10px;flex-shrink:0;}
.ka-hidden-badge{background:var(--dim);color:#fff;font-size:9px;font-weight:700;
  padding:1px 5px;border-radius:10px;flex-shrink:0;}

.ka-item-btns{
  display:flex;gap:4px;padding:0 10px 8px 34px;
  flex-wrap:nowrap;overflow-x:auto;
}
.ka-item-btns::-webkit-scrollbar{display:none;}

/* ══ INLINE EDIT FORM ══ */
.ka-edit-form{display:none;background:var(--sf2);border-top:1px solid var(--bd);padding:10px;}
.ka-edit-form.open{display:block;}

.ef-row{display:flex;gap:6px;align-items:flex-end;flex-wrap:wrap;margin-bottom:6px;}
.fg{display:flex;flex-direction:column;gap:2px;}
.fg lbl{font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--dim);
  text-transform:uppercase;display:block;}
.ef-input,.ef-select{
  background:var(--sf);border:1px solid var(--bd);color:var(--txt);
  font-family:'Barlow Condensed',sans-serif;font-size:14px;
  padding:6px 8px;border-radius:5px;outline:none;transition:border-color .2s;
  min-height:36px; /* touch friendly */
}
.ef-input:focus,.ef-select:focus{border-color:var(--ac);}
/* Time input with auto-colon: displays as HH:MM */
.ef-ti{
  width:72px;background:var(--sf);border:1px solid var(--bd);color:var(--txt);
  font-family:'Share Tech Mono',monospace;font-size:13px;
  padding:6px 8px;border-radius:5px;outline:none;transition:border-color .2s;
  min-height:36px;letter-spacing:1px;
  /* inputmode=numeric set in HTML */
}
.ef-ti:focus{border-color:var(--ac);}
.ef-color{width:40px;height:36px;border:1px solid var(--bd);border-radius:5px;
  background:var(--sf);cursor:pointer;padding:2px;}
.ef-select option{background:#1a1f2e;}

/* Segment block inside edit form */
.ef-seg{
  background:var(--sf);border:1px solid var(--bd);border-radius:6px;
  padding:7px 9px;margin-bottom:6px;position:relative;
}
.ef-seg-head{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.ef-seg-lbl{font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--ac);text-transform:uppercase;flex:1;}
.btn-remove-seg{background:transparent;border:1px solid var(--red);color:var(--red);
  font-size:11px;padding:1px 6px;border-radius:4px;cursor:pointer;line-height:1.4;}
.btn-remove-seg:hover{background:var(--red);color:#fff;}

/* Add segment button */
.btn-add-seg{
  width:100%;background:transparent;border:1px dashed var(--bd);color:var(--dim);
  font-family:'Rajdhani',sans-serif;font-weight:700;font-size:11px;letter-spacing:1.5px;
  text-transform:uppercase;padding:7px;border-radius:5px;cursor:pointer;
  transition:all .2s;margin-bottom:6px;min-height:34px;
}
.btn-add-seg:hover,.btn-add-seg:active{border-color:var(--ac);color:var(--ac);}

.ef-btns{display:flex;gap:5px;}

/* ══ ADD FORM ══ */
.add-form-wrap{border-top:2px solid var(--bd);padding:8px 10px;flex-shrink:0;background:var(--sf2);}
.add-toggle-btn{
  width:100%;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;
  letter-spacing:2px;text-transform:uppercase;background:var(--ac);color:#0a0c10;
  border:none;cursor:pointer;padding:8px;border-radius:5px;transition:background .2s;
  min-height:38px;
}
.add-toggle-btn:hover,.add-toggle-btn:active{background:#ffca50;}
.add-form{display:none;padding-top:10px;}
.add-form.open{display:block;}
</style>
</head>
<body>

<header>
  <div class="logo"></div>
  <h1>Garis Waktu Langsir</h1>
  <div class="htools">
    <span id="clock">—</span>
    <button class="btn btn-ghost btn-sm" id="btnUndo" onclick="undo()" title="Undo" style="opacity:0.35;">↩</button>
    <button class="btn btn-ghost btn-sm" id="btnRedo" onclick="redo()" title="Redo" style="opacity:0.35;">↪</button>
    <button class="btn btn-ghost btn-sm" onclick="resetAll()" title="Reset semua data" style="color:var(--red);border-color:var(--red);">⊘</button>
    <div id="cfBadge" onclick="toggleCF()">⚠ KONFLIK</div>
    <div class="zoom-c">
      <button class="btn btn-ghost btn-icon" onclick="zoom(-1)">−</button>
      <span class="zoom-l" id="zoomLbl">60m</span>
      <button class="btn btn-ghost btn-icon" onclick="zoom(1)">+</button>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="exportPNG()">📷</button>
    <button class="btn btn-ghost btn-sm" onclick="exportJSON(this)">💾</button>
    <label class="btn btn-ghost btn-sm" id="importLbl" style="cursor:pointer;">
      📂<input type="file" accept=".json" style="display:none" onchange="importJSON(event)">
    </label>
  </div>
</header>

<div class="app">

  <!-- ══ LEFT: TIMELINE ══ -->
  <div class="tl-wrap">
    <div class="tl-scroll" id="tlScroll">
      <div class="tl-inner" id="tlInner">
        <div class="tl-head">
          <div class="corner">JALUR</div>
          <div id="hourCells"></div>
        </div>
        <div class="tracks-area" id="tracksArea">
          <div id="emptyHint"><div class="big">⏱</div>Tambah KA di bawah</div>
        </div>
        <svg id="arrowSvg"></svg>
      </div>
    </div>
  </div>

  <!-- ══ RIGHT: SIDEBAR ══ -->
  <div class="sidebar" id="sidebar">
    <div class="sb-head sb-mobile-toggle" onclick="toggleSidebar()">
      <div class="sb-title">Daftar KA</div>
      <span id="kaCount"></span>
      <span class="sb-chevron">▲</span>
      <button class="sb-collapse-btn" onclick="toggleSidebarEdge(event)" title="Sembunyikan panel">◀</button>
    </div>
    <div class="sb-body" id="sbBody">
      <div class="sb-scroll" id="kaList"></div>
      <div class="add-form-wrap">
        <button class="add-toggle-btn" onclick="toggleAddForm()">＋ Tambah Kereta Api</button>
        <div class="add-form" id="addForm">
          <!-- Add form segments built by JS -->
          <div id="addSegContainer"></div>
          <button class="btn-add-seg" onclick="addFormAddSeg()">＋ Tambah Segmen Stabling</button>
          <div class="ef-btns" style="margin-top:4px;">
            <button class="btn btn-primary" onclick="doAdd()" style="flex:1;">＋ Masukkan ke Jalur</button>
            <button class="btn btn-ghost btn-sm" onclick="toggleAddForm()">Batal</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- CONFLICT PANEL -->
<div class="cf-panel" id="cfPanel">
  <div class="cf-title">⚠ KONFLIK JALUR</div>
  <div id="cfList"></div>
</div>

<!-- TOOLTIP -->
<div class="tooltip" id="tooltip">
  <div class="tt-name" id="ttName"></div>
  <div id="ttSegs"></div>
  <div class="tt-cf" id="ttCf">⚠ Ada konflik di jalur ini!</div>
</div>

<script>
// ══════════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════════
const TRACKS = ['I','II','III','IV','V','VI','CUCI 1','CUCI 2'];
const CUCI   = ['CUCI 1','CUCI 2'];
const JALUR  = ['I','II','III','IV','V','VI'];
const TOTAL  = 1440;
const ZOOM   = [60,30,15];
const COL_W  = 44;
const LW     = 72;
const ROW_H  = 64;
const BLK_TOP    = 3;
const BLK_BOTTOM = 16;

let kaData   = [];
let zoomIdx  = 0;
let conflicts= {};
let dragId   = null;

// ══════════════════════════════════════════════════
// LOCAL STORAGE — auto-save & auto-load
// ══════════════════════════════════════════════════
const LS_KEY = 'gariswaktu_v6';

function saveLocal(){
  try{
    localStorage.setItem(LS_KEY, JSON.stringify(kaData));
  } catch(e){ /* quota exceeded, abaikan */ }
}

function loadLocal(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return false;
    const parsed = JSON.parse(raw);
    if(Array.isArray(parsed) && parsed.length){
      kaData = parsed;
      return true;
    }
  } catch(e){}
  return false;
}

// ── UNDO/REDO STACK ──
let undoStack = [];
let redoStack = [];

function snapshot(){
  undoStack.push(JSON.stringify(kaData));
  if(undoStack.length>50) undoStack.shift();
  redoStack=[];
  updateUndoRedoBtns();
}
function undo(){
  if(!undoStack.length) return;
  redoStack.push(JSON.stringify(kaData));
  kaData=JSON.parse(undoStack.pop());
  renderAll(); updateUndoRedoBtns();
}
function redo(){
  if(!redoStack.length) return;
  undoStack.push(JSON.stringify(kaData));
  kaData=JSON.parse(redoStack.pop());
  renderAll(); updateUndoRedoBtns();
}
function resetAll(){
  if(!confirm('Reset semua data? Ini tidak bisa dibatalkan.')) return;
  snapshot();
  kaData=[];
  try{ localStorage.removeItem(LS_KEY); } catch(e){}
  renderAll();
}
function updateUndoRedoBtns(){
  const u=document.getElementById('btnUndo');
  const r=document.getElementById('btnRedo');
  if(u) u.style.opacity=undoStack.length?'1':'0.35';
  if(r) r.style.opacity=redoStack.length?'1':'0.35';
}

// ══════════════════════════════════════════════════
// TIME UTILS
// ══════════════════════════════════════════════════
function parseT(s){
  if(s==null||s==='') return null;
  s=String(s).replace(/[^0-9:]/g,'').trim();
  if(s.includes(':')){
    const [h,m]=s.split(':').map(Number);
    if(!isNaN(h)&&!isNaN(m)) return Math.max(0,Math.min(TOTAL,h*60+m));
  }
  const n=Number(s);
  if(!isNaN(n)&&n>=0&&n<=24) return Math.round(n*60);
  return null;
}
function fmt(m){
  return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0');
}
function durLabel(from,to){
  const d=to-from,h=Math.floor(d/60),m=d%60;
  if(h>0&&m>0) return h+'j'+m+'m';
  if(h>0) return h+'j';
  return m+'m';
}
function minsToGridX(mins){ return Math.round((mins/ZOOM[zoomIdx])*COL_W); }

// ══════════════════════════════════════════════════
// AUTO-COLON TIME INPUT
// Formats numeric input as HH:MM in real-time.
// User types digits only; colon inserted automatically.
// ══════════════════════════════════════════════════
function initTimeInput(el){
  el.setAttribute('inputmode','numeric');
  el.setAttribute('placeholder','HH:MM');
  el.setAttribute('maxlength','5');

  // Select all text on focus so user can immediately overtype
  el.addEventListener('focus', ()=>{ setTimeout(()=>el.select(),0); });

  el.addEventListener('keydown', e=>{
    // Allow: backspace, delete, arrows, tab
    if(['Backspace','Delete','ArrowLeft','ArrowRight','Tab'].includes(e.key)) return;
    // Allow only digits
    if(!/^\d$/.test(e.key)){e.preventDefault();return;}
  });

  el.addEventListener('input', ()=>{
    let raw = el.value.replace(/\D/g,''); // strip non-digits
    if(raw.length>4) raw=raw.slice(0,4);
    if(raw.length>=3){
      el.value = raw.slice(0,2)+':'+raw.slice(2);
    } else {
      el.value = raw;
    }
  });

  el.addEventListener('blur', ()=>{
    // Normalise: ensure HH:MM
    let v=el.value.replace(/\D/g,'');
    if(v.length===3) v='0'+v;
    if(v.length===4){
      let h=parseInt(v.slice(0,2)),m=parseInt(v.slice(2));
      h=Math.min(h,24); m=Math.min(m,59);
      el.value=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
    } else if(v.length===0){
      el.value='';
    }
  });
}

// Apply to all .ef-ti elements now and after DOM changes
function initAllTimeInputs(root=document){
  root.querySelectorAll('.ef-ti').forEach(el=>{
    if(!el.dataset.tiInit){el.dataset.tiInit='1';initTimeInput(el);}
  });
}

// ══════════════════════════════════════════════════
// SIDEBAR TOGGLE
// ══════════════════════════════════════════════════
function toggleSidebar(){
  // Mobile: expand/collapse height
  if(window.innerWidth < 700){
    document.getElementById('sidebar').classList.toggle('expanded');
  }
}
function toggleSidebarEdge(e){
  e.stopPropagation();
  const sb = document.getElementById('sidebar');
  const collapsed = sb.classList.toggle('collapsed-edge');
  const btn = sb.querySelector('.sb-collapse-btn');
  btn.textContent = collapsed ? '▶' : '◀';
  btn.title = collapsed ? 'Tampilkan panel' : 'Sembunyikan panel';
}

// ══════════════════════════════════════════════════
// ZOOM
// ══════════════════════════════════════════════════
function zoom(d){
  zoomIdx=Math.max(0,Math.min(ZOOM.length-1,zoomIdx+d));
  document.getElementById('zoomLbl').textContent=ZOOM[zoomIdx]+'m';
  rebuildGrid(); renderAll();
}

// ══════════════════════════════════════════════════
// BUILD GRID
// ══════════════════════════════════════════════════
function rebuildGrid(){
  const mpc=ZOOM[zoomIdx], cols=Math.ceil(TOTAL/mpc);
  document.getElementById('tlInner').style.minWidth=(LW+cols*COL_W)+'px';
  const hc=document.getElementById('hourCells');
  hc.innerHTML='';
  for(let c=0;c<cols;c++){
    const mins=c*mpc;
    const el=document.createElement('div');
    const isHour=mins%60===0;
    el.className='hcell '+(isHour?'major':'minor');
    el.style.width=COL_W+'px';el.style.minWidth=COL_W+'px';
    if(mpc===60){
      el.textContent=String(Math.floor(mins/60)).padStart(2,'0');
    } else if(isHour){
      el.textContent=String(Math.floor(mins/60)).padStart(2,'0');
    } else {
      el.textContent=':'+String(mins%60).padStart(2,'0');
    }
    hc.appendChild(el);
  }
  const area=document.getElementById('tracksArea');
  area.innerHTML='<div id="emptyHint"><div class="big">⏱</div>Tambah KA di bawah</div>';
  TRACKS.forEach(tr=>{
    const row=document.createElement('div');
    row.className='track-row'+(CUCI.includes(tr)?' cuci':'');
    row.dataset.track=tr;
    const lbl=document.createElement('div');
    lbl.className='track-label';lbl.textContent=tr;
    const grid=document.createElement('div');
    grid.className='track-grid';
    for(let c=0;c<cols;c++){
      const mins=c*mpc;
      const cell=document.createElement('div');
      cell.className='gcell'+(mins%60===0?' maj':'');
      cell.style.width=COL_W+'px';cell.style.minWidth=COL_W+'px';
      grid.appendChild(cell);
    }
    row.appendChild(lbl); row.appendChild(grid);
    area.appendChild(row);
  });
}

// ══════════════════════════════════════════════════
// CONFLICT DETECTION
// ══════════════════════════════════════════════════
function detectConflicts(){
  conflicts={};const cfList=[];
  const byTrack={};TRACKS.forEach(t=>byTrack[t]=[]);
  kaData.forEach(ka=>{
    (ka.segments||[]).forEach(s=>{
      if(byTrack[s.track]) byTrack[s.track].push({kaId:ka.id,nama:ka.nama,from:s.dari,to:s.sampai});
    });
  });
  TRACKS.forEach(track=>{
    const segs=byTrack[track];
    for(let i=0;i<segs.length;i++) for(let j=i+1;j<segs.length;j++)
      if(segs[i].from<segs[j].to&&segs[j].from<segs[i].to){
        conflicts[segs[i].kaId]=true; conflicts[segs[j].kaId]=true;
        cfList.push({track,a:segs[i].nama,b:segs[j].nama,
          t:fmt(Math.max(segs[i].from,segs[j].from))+'–'+fmt(Math.min(segs[i].to,segs[j].to))});
      }
  });
  document.getElementById('cfBadge').classList.toggle('show',cfList.length>0);
  document.getElementById('cfList').innerHTML=cfList.length
    ? cfList.map(c=>`<div class="cf-item">Jalur <b>${c.track}</b>: <b>${c.a}</b> & <b>${c.b}</b><br>
        <span style="font-size:10px;opacity:.7">${c.t}</span></div>`).join('')
    : '<div class="cf-item" style="color:var(--grn)">✓ Tidak ada konflik</div>';
}
function toggleCF(){document.getElementById('cfPanel').classList.toggle('open');}

// ══════════════════════════════════════════════════
// RENDER ALL
// ══════════════════════════════════════════════════
function renderAll(){
  saveLocal();
  detectConflicts();
  document.querySelectorAll('.ka-block').forEach(e=>e.remove());

  const area=document.getElementById('tracksArea');
  const mpc=ZOOM[zoomIdx], cols=TOTAL/mpc;
  const svgW=cols*COL_W, svgH=TRACKS.length*ROW_H;
  const blockH=ROW_H-BLK_TOP-BLK_BOTTOM;

  const svg=document.getElementById('arrowSvg');
  svg.setAttribute('width',svgW); svg.setAttribute('height',svgH);
  svg.style.cssText=`position:absolute;top:0;left:${LW}px;width:${svgW}px;height:${svgH}px;z-index:2;pointer-events:none;overflow:visible;`;
  if(svg.parentElement!==area) area.appendChild(svg);
  svg.innerHTML=``; // lines only, no arrowhead

  document.getElementById('emptyHint').style.display=kaData.length?'none':'block';

  // Header height for floating label offset check
  const headerH = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--HH'))||40;

  kaData.forEach(ka=>{
    if(!ka.segments||!ka.segments.length) return;
    const isCF=!!conflicts[ka.id];
    const isHidden=!!ka.hidden;

    const rendered=[];

    ka.segments.forEach((seg,si)=>{
      if(seg.dari>=seg.sampai){rendered.push(null);return;}
      const ti=TRACKS.indexOf(seg.track);
      if(ti<0){rendered.push(null);return;}

      const gridX=minsToGridX(seg.dari);
      const w=minsToGridX(seg.sampai)-gridX;
      const rowY=ti*ROW_H;
      rendered.push({ti,gridX,w,rowY});

      if(isHidden){
        // Still push for arrow calc but don't render block
        return;
      }

      const block=document.createElement('div');
      block.className='ka-block'+(isCF?' cf':'')+(isHidden?' hidden-block':'');
      block.style.cssText=[
        `left:${LW+gridX}px`,`top:${rowY+BLK_TOP}px`,
        `width:${w}px`,`height:${blockH}px`,
        `background:${ka.warna}`,`color:#fff`,
      ].join(';');

      // Name label
      const nm=document.createElement('span');
      nm.className='blk-name';
      nm.textContent=ka.nama;
      block.appendChild(nm);

      // Duration
      const dur=document.createElement('span');
      dur.className='blk-dur';
      dur.textContent=durLabel(seg.dari,seg.sampai);
      block.appendChild(dur);

      // Timestamps
      const tsL=document.createElement('span');
      tsL.className='blk-ts-l';tsL.textContent=fmt(seg.dari);
      block.appendChild(tsL);
      const tsR=document.createElement('span');
      tsR.className='blk-ts-r';tsR.textContent=fmt(seg.sampai);
      block.appendChild(tsR);

      block.addEventListener('mousemove',e=>showTT(e,ka,isCF));
      block.addEventListener('mouseleave',hideTT);
      area.appendChild(block);

      // After render: float name label if it doesn't fit inside block
      // Also move duration below name if name is floating
      ;(function(b,label,durEl,blockWidth,trackIdx){
        requestAnimationFrame(()=>{
          const lw = label.getBoundingClientRect().width;
          const fits = lw <= blockWidth - 8;
          if(!fits){
            if(trackIdx === 0){
              // First track: float below block so it doesn't go under header
              label.classList.add('below');
              // Duration goes further below the floating name
              durEl.style.bottom = 'auto';
              durEl.style.top = 'calc(100% + 28px)';
              durEl.style.left = '50%';
              durEl.style.transform = 'translateX(-50%)';
            } else {
              label.classList.add('above');
              // Duration goes above the floating name
              durEl.style.bottom = 'auto';
              durEl.style.top = 'calc(100% + 28px)';
              durEl.style.left = '50%';
              durEl.style.transform = 'translateX(-50%)';
            }
          }
          // Also check if duration overlaps name (when both inside) — push dur down
          // (no extra action needed since name is centred vertically and dur is below block)
        });
      })(block, nm, dur, w, ti);
    });

    // Arrows — connect consecutive rendered segments using block corners
    // Rule: if next block is BELOW current → exit from bottom-right of cur, enter top-left of next
    //        if next block is ABOVE current → exit from top-right of cur, enter bottom-left of next
    //        if same row → exit from right-center cur, enter left-center next (straight line)
    for(let si=0;si<rendered.length-1;si++){
      const cur=rendered[si], nx=rendered[si+1];
      if(!cur||!nx) continue;

      const blockH2 = ROW_H - BLK_TOP - BLK_BOTTOM;
      // Block vertical extents in SVG coords (SVG top = area top, each row is ROW_H px)
      const curTop    = cur.rowY + BLK_TOP;
      const curBottom = cur.rowY + BLK_TOP + blockH2;
      const nxTop     = nx.rowY  + BLK_TOP;
      const nxBottom  = nx.rowY  + BLK_TOP + blockH2;

      let x1, y1, x2, y2;

      if(cur.ti === nx.ti){
        // Same row: straight horizontal line (right-center → left-center)
        x1 = cur.gridX + cur.w;  y1 = (curTop+curBottom)/2;
        x2 = nx.gridX;           y2 = (nxTop+nxBottom)/2;
      } else if(nx.ti > cur.ti){
        // Next is BELOW: exit bottom-right of cur, enter top-left of next
        x1 = cur.gridX + cur.w;  y1 = curBottom;
        x2 = nx.gridX;           y2 = nxTop;
      } else {
        // Next is ABOVE: exit top-right of cur, enter bottom-left of next
        x1 = cur.gridX + cur.w;  y1 = curTop;
        x2 = nx.gridX;           y2 = nxBottom;
      }

      const path=document.createElementNS('http://www.w3.org/2000/svg','path');
      let d;
      if(cur.ti === nx.ti){
        d=`M${x1},${y1} L${x2},${y2}`;
      } else {
        // Cubic bezier with vertical handles for smooth corner-to-corner curve
        const dx = Math.abs(x2-x1);
        const cx1 = x1 + dx*0.5;
        const cx2 = x2 - dx*0.5;
        d=`M${x1},${y1} C${cx1},${y1} ${cx2},${y2} ${x2},${y2}`;
      }
      path.setAttribute('d',d);
      path.setAttribute('stroke',ka.warna);
      path.setAttribute('stroke-width','2');
      path.setAttribute('fill','none');
      path.setAttribute('opacity', isHidden?'0.12':'0.75');
      svg.appendChild(path);
    }
  });

  renderSidebar();
}

function contrast(h){
  const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return(0.299*r+0.587*g+0.114*b)>145?'#0a0c10':'#fff';
}

// ══════════════════════════════════════════════════
// TOOLTIP
// ══════════════════════════════════════════════════
function showTT(e,ka,isCF){
  const tt=document.getElementById('tooltip');
  document.getElementById('ttName').textContent=ka.nama;
  document.getElementById('ttSegs').innerHTML=(ka.segments||[]).map((s,i)=>
    `<div class="tt-row">${i+1}. <b>${s.track}</b> ${fmt(s.dari)}–${fmt(s.sampai)}</div>`
  ).join('');
  document.getElementById('ttCf').style.display=isCF?'block':'none';
  tt.style.left=(e.clientX+16)+'px'; tt.style.top=(e.clientY-14)+'px';
  tt.classList.add('show');
}
function hideTT(){document.getElementById('tooltip').classList.remove('show');}

// ══════════════════════════════════════════════════
// SIDEBAR
// ══════════════════════════════════════════════════
function renderSidebar(){
  const list=document.getElementById('kaList');
  const openEdits=new Set();
  list.querySelectorAll('.ka-edit-form.open').forEach(f=>openEdits.add(+f.dataset.id));

  list.innerHTML='';
  document.getElementById('kaCount').textContent=kaData.length+' KA';

  kaData.forEach((ka,idx)=>{
    const isCF=!!conflicts[ka.id];
    const item=document.createElement('div');
    item.className='ka-item';
    item.dataset.id=ka.id;
    item.draggable=true;

    // Head
    const head=document.createElement('div');
    head.className='ka-item-head';
    head.innerHTML=`
      <span class="drag-handle" title="Geser">⠿</span>
      <span class="ka-dot" style="background:${ka.warna}"></span>
      <span class="ka-item-name">${ka.nama}</span>
      <span class="ka-item-time">${ka.segments&&ka.segments[0]?fmt(ka.segments[0].dari):''}</span>
      ${isCF?'<span class="ka-cf-badge">CF</span>':''}
      ${ka.hidden?'<span class="ka-hidden-badge">HIDDEN</span>':''}
    `;

    // Buttons
    const btns=document.createElement('div');
    btns.className='ka-item-btns';

    const editBtn=document.createElement('button');
    editBtn.className='btn btn-edit-toggle btn-sm'+(openEdits.has(ka.id)?' active':'');
    editBtn.textContent='✎ Edit';

    const hideBtn=document.createElement('button');
    hideBtn.className='btn btn-hide btn-sm'+(ka.hidden?' active':'');
    hideBtn.textContent=ka.hidden?'👁 Tampilkan':'🚫 Sembunyikan';
    hideBtn.onclick=()=>{
      ka.hidden=!ka.hidden;
      renderAll();
    };

    const delBtn=document.createElement('button');
    delBtn.className='btn btn-del btn-sm';
    delBtn.textContent='✕ Hapus';
    delBtn.onclick=()=>hapus(ka.id);

    btns.appendChild(editBtn);
    btns.appendChild(hideBtn);
    btns.appendChild(delBtn);

    // Inline edit form
    const form=document.createElement('div');
    form.className='ka-edit-form'+(openEdits.has(ka.id)?' open':'');
    form.dataset.id=ka.id;
    form.innerHTML=buildEditFormHTML(ka);
    initAllTimeInputs(form);

    editBtn.onclick=()=>{
      const isOpen=form.classList.contains('open');
      form.classList.toggle('open',!isOpen);
      editBtn.classList.toggle('active',!isOpen);
    };

    item.appendChild(head);
    item.appendChild(btns);
    item.appendChild(form);

    // Wire edit form buttons
    form.querySelector('.ef-save-btn').onclick=()=>saveEdit(ka.id,form);
    form.querySelector('.ef-cancel-btn').onclick=()=>{
      form.classList.remove('open');
      editBtn.classList.remove('active');
    };
    form.querySelector('.ef-add-seg-btn').onclick=()=>{
      addSegToForm(form, ka.id);
    };

    // Drag & drop
    item.addEventListener('dragstart',e=>{
      dragId=ka.id;
      setTimeout(()=>item.classList.add('dragging'),0);
      e.dataTransfer.effectAllowed='move';
    });
    item.addEventListener('dragend',()=>{
      item.classList.remove('dragging');
      document.querySelectorAll('.ka-item').forEach(el=>el.classList.remove('drag-over'));
      dragId=null;
    });
    item.addEventListener('dragover',e=>{
      e.preventDefault();
      if(dragId===ka.id) return;
      document.querySelectorAll('.ka-item').forEach(el=>el.classList.remove('drag-over'));
      item.classList.add('drag-over');
    });
    item.addEventListener('drop',e=>{
      e.preventDefault();
      if(dragId===null||dragId===ka.id) return;
      const fi=kaData.findIndex(k=>k.id===dragId);
      const ti=idx;
      if(fi<0||fi===ti) return;
      const [m]=kaData.splice(fi,1);
      kaData.splice(ti,0,m);
      renderAll();
    });

    list.appendChild(item);
  });
}

// ══════════════════════════════════════════════════
// BUILD EDIT FORM HTML
// ══════════════════════════════════════════════════
function jalurOpts(sel){
  return JALUR.map(j=>`<option${j===sel?' selected':''}>${j}</option>`).join('');
}
function cuciOpts(sel){
  return CUCI.map(c=>`<option${c===sel?' selected':''}>${c}</option>`).join('');
}
function trackOpts(sel){
  return TRACKS.map(t=>`<option${t===sel?' selected':''}>${t}</option>`).join('');
}

function segTypeLabel(s,idx,total){
  if(idx===0) return '① Masuk Jalur';
  if(idx===total-1) return (total<=2?'②':'⑤'.charAt(0)+String.fromCharCode(9311+idx))+' Kembali ke Jalur';
  return ['②','③','④','⑤','⑥'][idx]||`${idx+1}.`+' Stabling';
}
function segLabel(idx,total){
  const nums=['①','②','③','④','⑤','⑥','⑦','⑧'];
  if(idx===0) return nums[0]+' Masuk Jalur';
  if(idx===total-1) return nums[idx]+' Kembali ke Jalur';
  return nums[idx]+' Stabling / Pindah Jalur';
}

function buildSegHTML(seg, idx, total, canRemove){
  const isFirst=idx===0, isLast=idx===total-1;
  // For first and last: separate jalur select; for middle (stabling): any track
  const trackSelect = (isFirst||isLast)
    ? `<select class="ef-select seg-track" style="width:56px;">${jalurOpts(seg.track)}</select>`
    : `<select class="ef-select seg-track" style="width:72px;">${trackOpts(seg.track)}</select>`;
  const fromLabel = isFirst ? 'Masuk' : 'Dari';
  const toLabel   = isLast  ? 'Berangkat' : 'Sampai';
  return `<div class="ef-seg" data-seg-idx="${idx}">
    <div class="ef-seg-head">
      <span class="ef-seg-lbl">${segLabel(idx,total)}</span>
      ${canRemove?`<button type="button" class="btn-remove-seg" onclick="removeSegFromForm(this)">✕</button>`:''}
    </div>
    <div class="ef-row">
      <div class="fg"><lbl>Jalur/Cuci</lbl>${trackSelect}</div>
      <div class="fg"><lbl>${fromLabel}</lbl><input class="ef-ti seg-dari" type="text" value="${fmt(seg.dari)}" inputmode="numeric" maxlength="5"></div>
      <div class="fg"><lbl>${toLabel}</lbl><input class="ef-ti seg-sampai" type="text" value="${fmt(seg.sampai)}" inputmode="numeric" maxlength="5"></div>
    </div>
  </div>`;
}

function buildEditFormHTML(ka){
  const segs=ka.segments||defaultSegments();
  const segsHTML=segs.map((s,i)=>buildSegHTML(s,i,segs.length,i>0&&i<segs.length-1)).join('');
  return `
  <div class="ef-row" style="margin-bottom:6px;">
    <div class="fg" style="flex:1;min-width:90px;"><lbl>Nama KA</lbl>
      <input class="ef-input ef-nama" type="text" value="${ka.nama}" style="width:100%;"/></div>
    <div class="fg"><lbl>Warna</lbl><input class="ef-color ef-warna" type="color" value="${ka.warna}"/></div>
  </div>
  <div class="ef-segs-container">${segsHTML}</div>
  <button type="button" class="btn-add-seg ef-add-seg-btn">＋ Tambah Segmen Stabling</button>
  <div class="ef-btns" style="margin-top:6px;">
    <button class="btn btn-primary ef-save-btn" style="flex:1;">💾 Simpan</button>
    <button class="btn btn-ghost btn-sm ef-cancel-btn">Batal</button>
  </div>`;
}

// Add a stabling segment to an existing edit form (before last segment)
function addSegToForm(form, kaId){
  const container=form.querySelector('.ef-segs-container');
  const segEls=Array.from(container.querySelectorAll('.ef-seg'));
  const total=segEls.length+1; // after adding
  const newIdx=segEls.length-1; // insert before last

  const newSeg={track:'II',dari:0,sampai:0};
  const newHtml=buildSegHTML(newSeg,newIdx,total,true);

  // Insert before last seg element
  const lastEl=segEls[segEls.length-1];
  lastEl.insertAdjacentHTML('beforebegin',newHtml);

  // Re-label all segments
  relabelFormSegs(container);
  initAllTimeInputs(form);
}

function removeSegFromForm(btn){
  const seg=btn.closest('.ef-seg');
  const container=seg.closest('.ef-segs-container');
  seg.remove();
  relabelFormSegs(container);
}

function relabelFormSegs(container){
  const segs=Array.from(container.querySelectorAll('.ef-seg'));
  const total=segs.length;
  segs.forEach((el,i)=>{
    el.dataset.segIdx=i;
    el.querySelector('.ef-seg-lbl').textContent=segLabel(i,total);
    // Show/hide remove button: only middle segments (not first, not last)
    let rmBtn=el.querySelector('.btn-remove-seg');
    const canRemove=i>0&&i<total-1;
    if(canRemove&&!rmBtn){
      el.querySelector('.ef-seg-head').insertAdjacentHTML('beforeend',
        `<button type="button" class="btn-remove-seg" onclick="removeSegFromForm(this)">✕</button>`);
    } else if(!canRemove&&rmBtn){
      rmBtn.remove();
    }
    // Update track select options: middle can pick any track
    const sel=el.querySelector('.seg-track');
    const curVal=sel.value;
    if(i>0&&i<total-1){
      // Stabling: all tracks
      sel.innerHTML=trackOpts(curVal);
      sel.style.width='72px';
    } else {
      // First/last: jalur only
      sel.innerHTML=jalurOpts(JALUR.includes(curVal)?curVal:'I');
      sel.style.width='56px';
    }
  });
}

function readFormSegs(container){
  const segs=[];
  const segEls=container.querySelectorAll('.ef-seg');
  for(const el of segEls){
    const track=el.querySelector('.seg-track').value;
    const dari=parseT(el.querySelector('.seg-dari').value);
    const sampai=parseT(el.querySelector('.seg-sampai').value);
    if(dari===null||sampai===null){alert('Format waktu harus HH:MM');return null;}
    if(dari>=sampai){alert(`Segmen "${track}": Waktu masuk harus lebih kecil dari waktu keluar`);return null;}
    segs.push({track,dari,sampai});
  }
  return segs;
}

function saveEdit(id,form){
  const nama=form.querySelector('.ef-nama').value.trim();
  if(!nama){alert('Nama KA harus diisi!');return;}
  const segs=readFormSegs(form.querySelector('.ef-segs-container'));
  if(!segs) return;
  snapshot();
  const idx=kaData.findIndex(k=>k.id===id);
  if(idx>=0) kaData[idx]={...kaData[idx],
    nama, warna:form.querySelector('.ef-warna').value, segments:segs};
  renderAll();
}

function hapus(id){
  if(!confirm('Hapus KA ini?')) return;
  snapshot();
  kaData=kaData.filter(k=>k.id!==id);
  renderAll();
}

// ══════════════════════════════════════════════════
// ADD FORM
// ══════════════════════════════════════════════════
let addFormOpen=false;
let addFormSegs=[]; // [{track,dari,sampai}]

function defaultSegments(){
  return [
    {track:'I',   dari:0,   sampai:240},
    {track:'CUCI 1',dari:240,sampai:360},
    {track:'I',   dari:360, sampai:600},
  ];
}

function toggleAddForm(){
  addFormOpen=!addFormOpen;
  const f=document.getElementById('addForm');
  f.classList.toggle('open',addFormOpen);
  if(addFormOpen) buildAddForm();
}

function buildAddForm(){
  addFormSegs=defaultSegments().map(s=>({...s}));
  renderAddSegs();
}

function renderAddSegs(){
  const c=document.getElementById('addSegContainer');
  const total=addFormSegs.length;
  c.innerHTML=`
    <div class="ef-row" style="margin-bottom:6px;">
      <div class="fg" style="flex:1;min-width:90px;"><lbl>Nama KA</lbl>
        <input class="ef-input" id="a_nama" type="text" placeholder="mis. 491/492" style="width:100%;"/></div>
      <div class="fg"><lbl>Warna</lbl><input class="ef-color" id="a_warna" type="color" value="#4ade80"/></div>
    </div>
    <div id="addSegsEl">${addFormSegs.map((s,i)=>buildSegHTML(s,i,total,i>0&&i<total-1)).join('')}</div>
  `;
  initAllTimeInputs(c);
}

function addFormAddSeg(){
  // Read current values first
  syncAddFormSegs();
  // Insert new stabling seg before last
  const last=addFormSegs.pop();
  addFormSegs.push({track:'II',dari:0,sampai:0});
  addFormSegs.push(last);
  renderAddSegs();
}

function syncAddFormSegs(){
  const segsEl=document.getElementById('addSegsEl');
  if(!segsEl) return;
  const els=segsEl.querySelectorAll('.ef-seg');
  addFormSegs=Array.from(els).map((el,i)=>({
    track:el.querySelector('.seg-track').value,
    dari:parseT(el.querySelector('.seg-dari').value)||0,
    sampai:parseT(el.querySelector('.seg-sampai').value)||0,
  }));
}

function doAdd(){
  const nama=document.getElementById('a_nama')?.value?.trim();
  if(!nama){alert('Nama KA harus diisi!');return;}
  const warna=document.getElementById('a_warna')?.value||'#4ade80';
  const segsEl=document.getElementById('addSegsEl');
  if(!segsEl) return;
  const segs=readFormSegs(segsEl);
  if(!segs) return;
  snapshot();
  kaData.push({id:Date.now(),nama,warna,hidden:false,segments:segs});
  addFormOpen=false;
  document.getElementById('addForm').classList.remove('open');
  renderAll();
}

// ══════════════════════════════════════════════════
// SAVE / LOAD / EXPORT
// ══════════════════════════════════════════════════
function exportJSON(btn){
  // Save dari/sampai as integer minutes (not strings) for reliable import
  const exportData=kaData.map(k=>({
    id:k.id, nama:k.nama, warna:k.warna, hidden:!!k.hidden,
    segments:(k.segments||[]).map(s=>({
      track:s.track,
      dari: typeof s.dari==='number'? s.dari : (parseT(s.dari)||0),
      sampai: typeof s.sampai==='number'? s.sampai : (parseT(s.sampai)||0),
    })),
  }));
  const blob=new Blob([JSON.stringify({v:6,savedAt:new Date().toISOString(),kaData:exportData},null,2)],
    {type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='garis-waktu-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  if(btn){const o=btn.textContent;btn.textContent='✓';btn.style.color='var(--grn)';
    setTimeout(()=>{btn.textContent=o;btn.style.color='';},2000);}
}

function importJSON(e){
  const file=e.target.files[0]; if(!file) return;
  e.target.value=''; // allow re-selecting same file
  const r=new FileReader();
  r.onerror=()=>alert('Gagal membaca file.');
  r.onload=ev=>{
    let obj;
    try{ obj=JSON.parse(ev.target.result); }
    catch(err){ alert('File bukan JSON yang valid.\n'+err); return; }

    // Support: plain array, {kaData:[...]}, {v:N, kaData:[...]}
    const raw = Array.isArray(obj)       ? obj
              : Array.isArray(obj.kaData) ? obj.kaData
              : null;
    if(!raw||!raw.length){ alert('File tidak berisi array kaData.'); return; }

    const toMins=v=>{
      if(v===null||v===undefined) return 0;
      // exportJSON always saves integer minutes → treat all numbers as minutes directly
      if(typeof v==='number') return Number.isFinite(v) ? Math.round(v) : 0;
      // String fallback: parse "HH:MM" or decimal hours
      if(typeof v==='string'){ const p=parseT(v); return p!==null ? p : 0; }
      return 0;
    };

    const validT=new Set(TRACKS);

    const parsed=raw.map((k,i)=>{
      let segs;
      if(Array.isArray(k.segments)&&k.segments.length){
        segs=k.segments.map(s=>({
          track:  validT.has(s.track) ? s.track : 'I',
          dari:   toMins(s.dari),
          sampai: toMins(s.sampai),
        }));
      } else {
        // Legacy 3-segment flat format
        segs=[
          {track:k.seg1Jalur||'I',     dari:toMins(k.seg1Dari),   sampai:toMins(k.seg1Sampai)},
          {track:k.seg2Cuci||'CUCI 1', dari:toMins(k.seg2Dari),   sampai:toMins(k.seg2Sampai)},
          {track:k.seg3Jalur||'I',     dari:toMins(k.seg3Dari),   sampai:toMins(k.seg3Sampai)},
        ];
      }
      // Drop invalid segments
      segs=segs.filter(s=>validT.has(s.track)&&typeof s.dari==='number'&&typeof s.sampai==='number'&&s.sampai>s.dari);
      if(!segs.length) return null;

      return {
        id:     Number.isInteger(k.id)&&k.id>0 ? k.id : (Date.now()+i*7),
        nama:   String(k.nama||'KA'+(i+1)),
        warna:  /^#[0-9a-fA-F]{6}$/.test(k.warna) ? k.warna : '#4ade80',
        hidden: !!k.hidden,
        segments: segs,
      };
    }).filter(Boolean);

    if(!parsed.length){ alert('Tidak ada segmen yang valid di file ini.'); return; }

    // Save current state for undo THEN assign
    undoStack.push(JSON.stringify(kaData));
    if(undoStack.length>50) undoStack.shift();
    redoStack=[];
    updateUndoRedoBtns();

    kaData=parsed;
    rebuildGrid();
    renderAll();

    // Visual feedback on the file input label
    const lbl=document.getElementById('importLbl');
    if(lbl){
      // Cari text node (bukan elemen <input>) untuk diubah teksnya
      const txtNode=Array.from(lbl.childNodes).find(n=>n.nodeType===Node.TEXT_NODE);
      if(txtNode){
        const orig=txtNode.textContent;
        txtNode.textContent=`✓ ${kaData.length} KA`;
        lbl.style.color='var(--grn)';
        setTimeout(()=>{ txtNode.textContent=orig; lbl.style.color=''; },2500);
      } else {
        lbl.style.color='var(--grn)';
        setTimeout(()=>{ lbl.style.color=''; },2500);
      }
    }
  };
  r.readAsText(file);
}

function exportPNG(){
  const inner=document.getElementById('tlInner');
  const scroll=document.getElementById('tlScroll');
  const orig=scroll.style.overflow;
  scroll.style.overflow='visible';
  html2canvas(inner,{backgroundColor:'#0a0c10',scale:2,useCORS:true,
    width:inner.scrollWidth,height:inner.scrollHeight})
  .then(c=>{scroll.style.overflow=orig;
    const a=document.createElement('a');a.href=c.toDataURL('image/png');
    a.download='garis-waktu-'+new Date().toISOString().slice(0,10)+'.png';a.click();})
  .catch(()=>{scroll.style.overflow=orig;alert('Export gagal.');});
}
