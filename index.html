<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GARIS WAKTU — Jadwal Langsir Kereta</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700;800&display=swap');

:root{
  --bg:#0a0c10; --sf:#11141a; --sf2:#181c24; --bd:#2a2f3d;
  --ac:#f0b429; --ac2:#00c2ff; --red:#ef4444; --grn:#22c55e;
  --txt:#e8eaf0; --dim:#6b7280; --gridline:#1e2330;
  --LW:72px;
  --ROW:64px; /* taller rows so duration label fits inside the row zone */
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);
  font-family:'Barlow Condensed',sans-serif;}

/* ══ HEADER ══ */
header{
  height:48px;background:linear-gradient(135deg,#0f1218,#181c28);
  border-bottom:2px solid var(--ac);padding:0 14px;
  display:flex;align-items:center;gap:10px;flex-shrink:0;
  box-shadow:0 4px 20px rgba(0,0,0,.5);z-index:300;
}
.logo{width:26px;height:26px;background:var(--ac);
  clip-path:polygon(0 20%,40% 0,100% 0,100% 80%,60% 100%,0 100%);}
header h1{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;
  letter-spacing:3px;color:var(--ac);text-transform:uppercase;}
.htools{margin-left:auto;display:flex;gap:5px;align-items:center;}
#clock{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--dim);margin-right:5px;}
#cfBadge{display:none;background:var(--red);color:#fff;font-size:10px;font-weight:700;
  letter-spacing:1px;padding:2px 8px;border-radius:20px;cursor:pointer;white-space:nowrap;}
#cfBadge.show{display:block;}
.zoom-c{display:flex;gap:3px;align-items:center;}
.zoom-l{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--dim);min-width:32px;text-align:center;}
.btn{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:11px;letter-spacing:1px;
  text-transform:uppercase;border:none;cursor:pointer;padding:4px 10px;border-radius:4px;
  transition:all .15s;white-space:nowrap;}
.btn-ghost{background:transparent;border:1px solid var(--bd);color:var(--dim);}
.btn-ghost:hover{border-color:var(--txt);color:var(--txt);}
.btn-primary{background:var(--ac);color:#0a0c10;}
.btn-primary:hover{background:#ffca50;}
.btn-edit-toggle{background:transparent;border:1px solid var(--ac2);color:var(--ac2);}
.btn-edit-toggle:hover,.btn-edit-toggle.active{background:var(--ac2);color:#0a0c10;}
.btn-del{background:transparent;border:1px solid var(--red);color:var(--red);}
.btn-del:hover{background:var(--red);color:#fff;}
.btn-sm{padding:3px 7px;font-size:10px;}

/* ══ LAYOUT ══ */
.app{display:flex;height:calc(100vh - 48px);overflow:hidden;}

/* ══ LEFT — TIMELINE ══ */
.tl-wrap{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;}

/* Custom scrollbar — big & grabbable */
.tl-scroll{
  flex:1;min-height:0;
  overflow-x:auto;overflow-y:hidden;
  position:relative;
}
.tl-scroll::-webkit-scrollbar{height:18px;}
.tl-scroll::-webkit-scrollbar-track{background:#0d1018;border-top:1px solid var(--bd);}
.tl-scroll::-webkit-scrollbar-thumb{
  background:linear-gradient(to bottom,#3a4060,#252a3a);
  border-radius:9px;border:3px solid #0d1018;
  min-width:60px;
}
.tl-scroll::-webkit-scrollbar-thumb:hover{background:linear-gradient(to bottom,#5a6090,#353a50);}
.tl-scroll::-webkit-scrollbar-button{display:none;}

.tl-inner{display:flex;flex-direction:column;height:calc(100% - 18px);/* leave room for scrollbar */}

/* Hour header */
.tl-head{
  display:flex;height:36px;flex-shrink:0;
  background:var(--sf);border-bottom:2px solid var(--bd);
}
.corner{
  width:var(--LW);min-width:var(--LW);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;letter-spacing:2px;color:var(--ac);
  border-right:2px solid var(--bd);background:var(--sf2);text-transform:uppercase;
}
#hourCells{display:flex;}
.hcell{
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-family:'Share Tech Mono',monospace;color:var(--dim);
  border-right:1px solid var(--bd);user-select:none;
}
.hcell.major{color:var(--txt);font-size:12px;}
.hcell.minor{color:var(--dim);border-right-color:var(--gridline);font-size:9px;}

/* Track rows — fixed height, not flex-fill, so duration label stays inside */
.tracks-area{
  flex:1;min-height:0;overflow:hidden;
  position:relative;display:flex;flex-direction:column;
}
.track-row{
  height:var(--ROW);min-height:var(--ROW);flex-shrink:0;
  display:flex;border-bottom:1px solid var(--gridline);position:relative;overflow:visible;
}
.track-row.cuci .track-label{background:rgba(0,194,255,.07);color:var(--ac2);}
.track-label{
  width:var(--LW);min-width:var(--LW);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:11px;letter-spacing:1.2px;color:var(--ac);
  background:var(--sf2);border-right:2px solid var(--bd);
  position:sticky;left:0;z-index:10;text-transform:uppercase;
}
.track-grid{position:relative;flex:1;display:flex;overflow:visible;}
.gcell{border-right:1px solid var(--gridline);height:100%;flex-shrink:0;}
.gcell.maj{border-right-color:var(--bd);}

/* ══ BLOCK STRUCTURE ══
   Row height = ROW_H (e.g. 64px)
   Block occupies top portion: top=2px, height=ROW_H - 18px (bottom 16px reserved for duration label)
   Inside block:
     • Name label: positioned at top ~30% of block (upper half)
     • Timestamps: positioned OUTSIDE block, vertically near bottom of block zone
*/
.ka-block{
  position:absolute;
  border-radius:4px;
  overflow:visible; /* allow name label + timestamps to float outside */
  cursor:pointer;pointer-events:all;
  border:1.5px solid rgba(255,255,255,.22);
  box-shadow:0 2px 10px rgba(0,0,0,.5);
  transition:filter .15s,box-shadow .15s;z-index:5;
}
.ka-block:hover{filter:brightness(1.18);box-shadow:0 0 0 2px rgba(255,255,255,.4);z-index:20;}
.ka-block:hover .blk-name{z-index:50;}
.ka-block.cf{box-shadow:0 0 0 2px var(--red),0 0 10px rgba(239,68,68,.35)!important;}

/* KA name — always fully visible pill, centered on block mid-x.
   For wide blocks  → sits inside the block (top 35%).
   For narrow blocks → JS positions it ABOVE the block row (see renderAll).
   Either way: never clipped, never ellipsis. */
.blk-name{
  position:absolute;
  left:50%;
  transform:translateX(-50%) translateY(-50%);
  top:35%;
  text-align:center;
  font-size:11px;font-weight:700;letter-spacing:0.2px;
  pointer-events:none;
  white-space:nowrap;
  overflow:visible;
  z-index:22;
  /* dark pill for readability on any background */
  background:rgba(0,0,0,.45);
  border-radius:4px;
  padding:2px 6px;
  border:1px solid rgba(255,255,255,.15);
  box-shadow:0 1px 4px rgba(0,0,0,.5);
  text-shadow:0 1px 3px rgba(0,0,0,.7);
}
/* When the block is very narrow, JS adds class .blk-name-above
   and repositions the label above the block row */
.blk-name.blk-name-above{
  top:auto;
  bottom:calc(100% + 4px); /* above the block */
  transform:translateX(-50%);
  background:rgba(15,18,28,.9);
  border-color:rgba(255,255,255,.3);
  box-shadow:0 2px 10px rgba(0,0,0,.7);
}
/* tiny triangle pointer below the floating label */
.blk-name.blk-name-above::after{
  content:'';
  position:absolute;
  top:100%;left:50%;transform:translateX(-50%);
  border:5px solid transparent;
  border-top-color:rgba(15,18,28,.9);
}

/* Duration label — INSIDE the row but BELOW the block, in the reserved bottom zone */
.blk-dur{
  position:absolute;
  left:0;right:0;
  bottom:-14px; /* sits in the 16px reserved zone below the block */
  text-align:center;
  font-family:'Share Tech Mono',monospace;font-size:9px;
  color:rgba(255,255,255,.5);
  pointer-events:none;white-space:nowrap;
}

/* Timestamps — outside block horizontally, near BOTTOM of block (lower half) */
.blk-ts-l,.blk-ts-r{
  position:absolute;
  font-family:'Share Tech Mono',monospace;font-size:9px;
  color:rgba(255,255,255,.75);
  white-space:nowrap;pointer-events:none;z-index:6;
  /* vertically: lower portion of block */
  bottom:3px;
}
.blk-ts-l{
  right:calc(100% + 3px);
  text-align:right;
}
.blk-ts-r{
  left:calc(100% + 3px);
  text-align:left;
}

/* ══ ARROWS SVG ══
   The SVG is positioned over .tracks-area, starts at x=LW
   Block x coords are relative to .track-grid (which starts after the label)
   So SVG x = block_x (already offset from LW)
   SVG y = trackIndex * ROW_H + ROW_H/2  (vertical center of track)
   Arrow start = right edge of block  → (block_x + block_w, track_cy)
   Arrow end   = left edge of next block → (next_block_x, next_track_cy)
*/
#arrowSvg{
  position:absolute;
  top:0;
  pointer-events:none;z-index:12;overflow:visible;
}

/* ══ EMPTY HINT ══ */
#emptyHint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;color:var(--dim);pointer-events:none;}
#emptyHint .big{font-size:34px;opacity:.12;margin-bottom:5px;}

/* ══ TOOLTIP ══ */
.tooltip{
  position:fixed;background:#1a1f2e;border:1px solid var(--ac);
  padding:9px 13px;border-radius:6px;pointer-events:none;display:none;
  z-index:600;box-shadow:0 8px 32px rgba(0,0,0,.6);min-width:190px;font-size:13px;
}
.tooltip.show{display:block;}
.tt-name{font-size:14px;font-weight:700;color:var(--ac);margin-bottom:5px;}
.tt-row{font-size:12px;color:var(--dim);margin-bottom:2px;}
.tt-row b{color:var(--txt);font-weight:600;}
.tt-cf{color:var(--red);font-size:11px;margin-top:4px;font-weight:700;display:none;}

/* ══ CONFLICT PANEL ══ */
.cf-panel{
  position:fixed;top:56px;right:14px;width:260px;
  background:var(--sf);border:1px solid var(--red);border-radius:8px;
  padding:12px;z-index:500;display:none;
  box-shadow:0 8px 32px rgba(0,0,0,.6);
}
.cf-panel.open{display:block;}
.cf-title{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--red);margin-bottom:8px;}
.cf-item{font-size:12px;padding:4px 0;border-bottom:1px solid var(--gridline);color:var(--dim);}
.cf-item b{color:var(--txt);}

/* ══ RIGHT — SIDEBAR ══ */
.sidebar{
  width:300px;min-width:300px;flex-shrink:0;
  background:var(--sf);border-left:2px solid var(--bd);
  display:flex;flex-direction:column;overflow:hidden;
}
.sb-head{
  padding:10px 12px;border-bottom:1px solid var(--bd);flex-shrink:0;
  display:flex;align-items:center;gap:8px;
}
.sb-title{font-size:10px;font-weight:700;letter-spacing:2.5px;color:var(--ac);text-transform:uppercase;}
.sb-scroll{flex:1;overflow-y:auto;padding:4px 0;}
.sb-scroll::-webkit-scrollbar{width:6px;}
.sb-scroll::-webkit-scrollbar-track{background:var(--bg);}
.sb-scroll::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px;}

/* KA ITEM */
.ka-item{border-bottom:1px solid var(--gridline);background:var(--sf);transition:background .15s;}
.ka-item.dragging{opacity:.35;background:var(--sf2);}
.ka-item.drag-over{border-top:2px solid var(--ac);}
.ka-item-head{display:flex;align-items:center;gap:6px;padding:7px 10px;cursor:grab;}
.ka-item-head:active{cursor:grabbing;}
.drag-handle{color:var(--dim);font-size:14px;cursor:grab;flex-shrink:0;line-height:1;}
.ka-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.ka-item-name{font-size:13px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ka-item-time{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim);flex-shrink:0;}
.ka-cf-badge{background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;flex-shrink:0;}
.ka-item-btns{display:flex;gap:4px;padding:0 10px 7px 32px;}

/* Inline edit form */
.ka-edit-form{display:none;background:var(--sf2);border-top:1px solid var(--bd);padding:10px 10px 12px;}
.ka-edit-form.open{display:block;}
.ef-row{display:flex;gap:6px;align-items:flex-end;flex-wrap:wrap;margin-bottom:6px;}
.fg{display:flex;flex-direction:column;gap:2px;}
.fg lbl{font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;display:block;}
.ef-input,.ef-select{
  background:var(--sf);border:1px solid var(--bd);color:var(--txt);
  font-family:'Barlow Condensed',sans-serif;font-size:13px;
  padding:4px 7px;border-radius:4px;outline:none;transition:border-color .2s;
}
.ef-input:focus,.ef-select:focus{border-color:var(--ac);}
.ef-ti{width:64px;background:var(--sf);border:1px solid var(--bd);color:var(--txt);
  font-family:'Share Tech Mono',monospace;font-size:12px;
  padding:4px 6px;border-radius:4px;outline:none;transition:border-color .2s;}
.ef-ti:focus{border-color:var(--ac);}
.ef-color{width:38px;height:28px;border:1px solid var(--bd);border-radius:4px;
  background:var(--sf);cursor:pointer;padding:2px;}
.ef-seg{background:var(--sf);border:1px solid var(--bd);border-radius:5px;padding:6px 8px;margin-bottom:6px;}
.ef-seg-lbl{font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--ac);text-transform:uppercase;margin-bottom:4px;}
.ef-btns{display:flex;gap:5px;}
.ef-select option{background:#1a1f2e;}

/* ADD FORM */
.add-form-wrap{border-top:2px solid var(--bd);padding:8px 10px;flex-shrink:0;background:var(--sf2);}
.add-toggle-btn{
  width:100%;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;
  letter-spacing:2px;text-transform:uppercase;background:var(--ac);color:#0a0c10;
  border:none;cursor:pointer;padding:7px;border-radius:5px;transition:background .2s;
}
.add-toggle-btn:hover{background:#ffca50;}
.add-form{display:none;padding-top:10px;}
.add-form.open{display:block;}
</style>
</head>
<body>

<header>
  <div class="logo">🚂</div>
  <h1>Garis Waktu Langsir</h1>
  <div class="htools">
    <span id="clock">—</span>
    <div id="cfBadge" onclick="toggleCF()">⚠ KONFLIK</div>
    <div class="zoom-c">
      <button class="btn btn-ghost" onclick="zoom(-1)">−</button>
      <span class="zoom-l" id="zoomLbl">60m</span>
      <button class="btn btn-ghost" onclick="zoom(1)">+</button>
    </div>
    <button class="btn btn-ghost" onclick="exportPNG()">📷 PNG</button>
    <button class="btn btn-ghost" onclick="exportJSON()">💾 Simpan</button>
    <label class="btn btn-ghost" style="cursor:pointer;">
      📂 Buka<input type="file" accept=".json" style="display:none" onchange="importJSON(event)">
    </label>
  </div>
</header>

<div class="app">

  <!-- LEFT: TIMELINE -->
  <div class="tl-wrap">
    <div class="tl-scroll" id="tlScroll">
      <div class="tl-inner" id="tlInner">
        <div class="tl-head">
          <div class="corner">JALUR</div>
          <div id="hourCells"></div>
        </div>
        <div class="tracks-area" id="tracksArea">
          <div id="emptyHint"><div class="big">⏱</div>Tambah KA di sidebar kanan</div>
        </div>
        <!-- SVG rendered by JS, positioned over tracksArea -->
        <svg id="arrowSvg"></svg>
      </div>
    </div>
  </div>

  <!-- RIGHT: SIDEBAR -->
  <div class="sidebar">
    <div class="sb-head">
      <div class="sb-title">Daftar KA</div>
      <span id="kaCount" style="font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--dim);margin-left:auto;"></span>
    </div>
    <div class="sb-scroll" id="kaList"></div>
    <div class="add-form-wrap">
      <button class="add-toggle-btn" onclick="toggleAddForm()">＋ Tambah Kereta Api</button>
      <div class="add-form" id="addForm">
        <div class="ef-row">
          <div class="fg" style="flex:1;min-width:90px;">
            <lbl>Nama KA</lbl>
            <input class="ef-input" id="a_nama" type="text" placeholder="mis. 491/492" style="width:100%;"/>
          </div>
          <div class="fg"><lbl>Warna</lbl><input class="ef-color" id="a_warna" type="color" value="#4ade80"/></div>
        </div>
        <div class="ef-seg">
          <div class="ef-seg-lbl">① Masuk Jalur</div>
          <div class="ef-row">
            <div class="fg"><lbl>Jalur</lbl><select class="ef-select" id="a_j1" style="width:56px;"><option>I</option><option>II</option><option>III</option><option>IV</option><option>V</option><option>VI</option></select></div>
            <div class="fg"><lbl>Dari</lbl><input class="ef-ti" id="a_s1d" type="text" value="00:00"/></div>
            <div class="fg"><lbl>Sampai</lbl><input class="ef-ti" id="a_s1s" type="text" value="04:00"/></div>
          </div>
        </div>
        <div class="ef-seg">
          <div class="ef-seg-lbl">② Jalur Cuci</div>
          <div class="ef-row">
            <div class="fg"><lbl>Cuci</lbl><select class="ef-select" id="a_cuci" style="width:70px;"><option>CUCI 1</option><option>CUCI 2</option></select></div>
            <div class="fg"><lbl>Dari</lbl><input class="ef-ti" id="a_s2d" type="text" value="04:00"/></div>
            <div class="fg"><lbl>Sampai</lbl><input class="ef-ti" id="a_s2s" type="text" value="06:00"/></div>
          </div>
        </div>
        <div class="ef-seg">
          <div class="ef-seg-lbl">③ Kembali ke Jalur</div>
          <div class="ef-row">
            <div class="fg"><lbl>Jalur</lbl><select class="ef-select" id="a_j3" style="width:56px;"><option>I</option><option>II</option><option>III</option><option>IV</option><option>V</option><option>VI</option></select></div>
            <div class="fg"><lbl>Dari</lbl><input class="ef-ti" id="a_s3d" type="text" value="06:00"/></div>
            <div class="fg"><lbl>Berangkat</lbl><input class="ef-ti" id="a_s3s" type="text" value="10:00"/></div>
          </div>
        </div>
        <div class="ef-btns">
          <button class="btn btn-primary" onclick="doAdd()" style="flex:1;">＋ Tambah</button>
          <button class="btn btn-ghost btn-sm" onclick="toggleAddForm()">Batal</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- CONFLICT PANEL -->
<div class="cf-panel" id="cfPanel">
  <div class="cf-title">⚠ KONFLIK JALUR</div>
  <div id="cfList"></div>
</div>

<!-- TOOLTIP -->
<div class="tooltip" id="tooltip">
  <div class="tt-name" id="ttName"></div>
  <div class="tt-row">Jalur awal: <b id="ttJ1"></b></div>
  <div class="tt-row">Cuci: <b id="ttCuci"></b></div>
  <div class="tt-row">Jalur akhir: <b id="ttJ2"></b></div>
  <div class="tt-cf" id="ttCf">⚠ Ada konflik di jalur ini!</div>
</div>

<script>
// ══════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════
const TRACKS = ['I','II','III','IV','V','VI','CUCI 1','CUCI 2'];
const CUCI   = ['CUCI 1','CUCI 2'];
const TOTAL  = 1440;            // total minutes/day
const ZOOM   = [60, 30, 15];   // minutes per column
const COL_W  = 44;             // px per column
const LW     = 72;             // label width px  (matches --LW)
const ROW_H  = 64;             // row height px   (matches --ROW)

// Block sits in the top portion; bottom zone reserved for duration label
const BLK_TOP    = 3;          // px from top of row
const BLK_BOTTOM = 16;         // px reserved at bottom of row for duration
// So block height = ROW_H - BLK_TOP - BLK_BOTTOM = 45px

let kaData   = [];
let zoomIdx  = 0;
let conflicts= {};

// ══════════════════════════════════════════
// TIME UTILS
// ══════════════════════════════════════════
function parseT(s) {
  if (s == null || s === '') return null;
  const str = String(s).trim();
  if (str.includes(':')) {
    const [h, m] = str.split(':').map(Number);
    if (!isNaN(h) && !isNaN(m)) return Math.max(0, Math.min(TOTAL, h * 60 + m));
  }
  const n = Number(str);
  if (!isNaN(n) && n >= 0 && n <= 24) return Math.round(n * 60);
  return null;
}
function fmt(m) {
  return String(Math.floor(m / 60)).padStart(2,'0') + ':' + String(m % 60).padStart(2,'0');
}
function durLabel(from, to) {
  const d = to - from;
  const h = Math.floor(d / 60), m = d % 60;
  if (h > 0 && m > 0) return h + 'j' + m + 'm';
  if (h > 0) return h + 'j';
  return m + 'm';
}

// Convert minutes → x pixel offset from the LEFT EDGE OF .track-grid
// (i.e., does NOT include the LW label strip)
function minsToGridX(mins) {
  return (mins / ZOOM[zoomIdx]) * COL_W;
}

// ══════════════════════════════════════════
// ZOOM
// ══════════════════════════════════════════
function zoom(d) {
  zoomIdx = Math.max(0, Math.min(ZOOM.length - 1, zoomIdx + d));
  document.getElementById('zoomLbl').textContent = ZOOM[zoomIdx] + 'm';
  rebuildGrid();
  renderAll();
}

// ══════════════════════════════════════════
// BUILD GRID
// ══════════════════════════════════════════
function rebuildGrid() {
  const mpc  = ZOOM[zoomIdx];
  const cols = TOTAL / mpc;
  const totalW = LW + cols * COL_W;
  document.getElementById('tlInner').style.minWidth = totalW + 'px';

  // Hour header
  const hc = document.getElementById('hourCells');
  hc.innerHTML = '';
  for (let c = 0; c < cols; c++) {
    const mins = c * mpc;
    const el = document.createElement('div');
    el.className = 'hcell ' + (mpc === 60 || mins % 60 === 0 ? 'major' : 'minor');
    el.style.width = COL_W + 'px';
    el.style.minWidth = COL_W + 'px';
    if      (mpc === 60)    el.textContent = String(mins / 60).padStart(2,'0');
    else if (mins % 60 === 0) el.textContent = String(mins / 60).padStart(2,'0');
    else                    el.textContent = ':' + String(mins % 60).padStart(2,'0');
    hc.appendChild(el);
  }

  // Track rows
  const area = document.getElementById('tracksArea');
  area.innerHTML = '<div id="emptyHint"><div class="big">⏱</div>Tambah KA di sidebar kanan</div>';
  TRACKS.forEach(tr => {
    const row = document.createElement('div');
    row.className = 'track-row' + (CUCI.includes(tr) ? ' cuci' : '');
    row.dataset.track = tr;

    const lbl = document.createElement('div');
    lbl.className = 'track-label';
    lbl.textContent = tr;

    const grid = document.createElement('div');
    grid.className = 'track-grid';
    for (let c = 0; c < cols; c++) {
      const mins = c * mpc;
      const cell = document.createElement('div');
      cell.className = 'gcell' + (mins % 60 === 0 ? ' maj' : '');
      cell.style.width = COL_W + 'px';
      cell.style.minWidth = COL_W + 'px';
      grid.appendChild(cell);
    }
    row.appendChild(lbl);
    row.appendChild(grid);
    area.appendChild(row);
  });
}

// ══════════════════════════════════════════
// CONFLICT DETECTION
// ══════════════════════════════════════════
function detectConflicts() {
  conflicts = {};
  const cfList = [];
  const byTrack = {};
  TRACKS.forEach(t => byTrack[t] = []);
  kaData.forEach(ka => {
    [
      { track: ka.seg1Jalur, from: ka.seg1Dari, to: ka.seg1Sampai },
      { track: ka.seg2Cuci,  from: ka.seg2Dari, to: ka.seg2Sampai },
      { track: ka.seg3Jalur, from: ka.seg3Dari, to: ka.seg3Sampai },
    ].forEach(s => {
      if (byTrack[s.track]) byTrack[s.track].push({ kaId: ka.id, nama: ka.nama, from: s.from, to: s.to });
    });
  });
  TRACKS.forEach(track => {
    const segs = byTrack[track];
    for (let i = 0; i < segs.length; i++)
      for (let j = i + 1; j < segs.length; j++)
        if (segs[i].from < segs[j].to && segs[j].from < segs[i].to) {
          conflicts[segs[i].kaId] = true;
          conflicts[segs[j].kaId] = true;
          cfList.push({ track, a: segs[i].nama, b: segs[j].nama,
            t: fmt(Math.max(segs[i].from, segs[j].from)) + '–' + fmt(Math.min(segs[i].to, segs[j].to)) });
        }
  });
  document.getElementById('cfBadge').classList.toggle('show', cfList.length > 0);
  document.getElementById('cfList').innerHTML = cfList.length
    ? cfList.map(c => `<div class="cf-item">Jalur <b>${c.track}</b>: <b>${c.a}</b> & <b>${c.b}</b><br>
        <span style="font-size:10px;opacity:.7">${c.t}</span></div>`).join('')
    : '<div class="cf-item" style="color:var(--grn)">✓ Tidak ada konflik</div>';
}
function toggleCF() { document.getElementById('cfPanel').classList.toggle('open'); }

// ══════════════════════════════════════════
// RENDER BLOCKS + ARROWS
// ══════════════════════════════════════════
function renderAll() {
  detectConflicts();
  document.querySelectorAll('.ka-block').forEach(e => e.remove());

  const area  = document.getElementById('tracksArea');
  const mpc   = ZOOM[zoomIdx];
  const cols  = TOTAL / mpc;
  const svgW  = cols * COL_W;
  const svgH  = TRACKS.length * ROW_H;

  // ── Position SVG correctly over the tracks-area grid ──
  // tracksArea contains: sticky label strip (LW wide) + grid
  // We want SVG to align with the grid, so offset left by LW
  const svg = document.getElementById('arrowSvg');
  svg.setAttribute('width',  svgW);
  svg.setAttribute('height', svgH);
  svg.style.position = 'absolute';
  svg.style.top      = '0px';
  svg.style.left     = LW + 'px';   // aligns with grid, same as blocks
  svg.style.width    = svgW + 'px';
  svg.style.height   = svgH + 'px';
  svg.style.zIndex   = '12';
  svg.style.pointerEvents = 'none';
  svg.style.overflow = 'visible';

  // Place SVG as child of tracksArea so coordinates are in the same space
  if (svg.parentElement !== area) area.appendChild(svg);

  svg.innerHTML = `<defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,1 L8,4.5 L0,8 Z" fill="rgba(255,255,255,.95)"/>
    </marker>
  </defs>`;

  document.getElementById('emptyHint').style.display = kaData.length ? 'none' : 'block';

  const blockH = ROW_H - BLK_TOP - BLK_BOTTOM;

  kaData.forEach(ka => {
    const segs = [
      { track: ka.seg1Jalur, from: ka.seg1Dari, to: ka.seg1Sampai },
      { track: ka.seg2Cuci,  from: ka.seg2Dari, to: ka.seg2Sampai },
      { track: ka.seg3Jalur, from: ka.seg3Dari, to: ka.seg3Sampai },
    ];
    const isCF = !!conflicts[ka.id];

    // Collect rendered segment info for arrows
    const rendered = []; // { ti, gridX, w }

    segs.forEach((seg, si) => {
      if (seg.from >= seg.to) { rendered.push(null); return; }
      const ti = TRACKS.indexOf(seg.track);
      if (ti < 0) { rendered.push(null); return; }

      // x in grid-local coords (relative to grid, not label)
      const gridX = minsToGridX(seg.from);
      const w     = minsToGridX(seg.to) - gridX;
      const rowY  = ti * ROW_H;

      rendered.push({ ti, gridX, w, rowY });

      // ── Block div ──
      // Blocks live inside .tracks-area.  The track-grid starts after the label.
      // We set left = LW + gridX so it aligns with the grid strip.
      const block = document.createElement('div');
      block.className = 'ka-block' + (isCF ? ' cf' : '');
      block.style.cssText = [
        `left:${LW + gridX}px`,
        `top:${rowY + BLK_TOP}px`,
        `width:${w}px`,
        `height:${blockH}px`,
        `background:${ka.warna}`,
        `color:${contrast(ka.warna)}`,
      ].join(';');

      // Name label — centered; JS will move above if block is too narrow
      const nm = document.createElement('span');
      nm.className = 'blk-name';
      nm.textContent = ka.nama;
      block.appendChild(nm);

      // After appending, measure whether the label fits inside the block.
      // We do this via requestAnimationFrame so the browser has laid it out.
      // Store a reference so the rAF closure can check.
      (function(b, label, blockWidth){
        requestAnimationFrame(() => {
          // labelWidth = rendered width of the text pill
          const lw = label.getBoundingClientRect().width;
          // If the label is wider than the block (minus small padding), float it above
          if (lw > blockWidth - 4) {
            label.classList.add('blk-name-above');
            // Also set color to the block's color for the triangle
            label.style.setProperty('--ka-color', b.style.background);
            label.style.color = b.style.color; // keep text contrast
          }
        });
      })(block, nm, w);

      // Duration — below the block (in reserved bottom zone of the row)
      const dur = document.createElement('span');
      dur.className = 'blk-dur';
      dur.textContent = durLabel(seg.from, seg.to);
      block.appendChild(dur);

      // Left timestamp (start) — outside block, lower-left
      const tsL = document.createElement('span');
      tsL.className = 'blk-ts-l';
      tsL.textContent = fmt(seg.from);
      block.appendChild(tsL);

      // Right timestamp (end) — outside block, lower-right
      const tsR = document.createElement('span');
      tsR.className = 'blk-ts-r';
      tsR.textContent = fmt(seg.to);
      block.appendChild(tsR);

      block.addEventListener('mousemove', e => showTT(e, ka, isCF));
      block.addEventListener('mouseleave', hideTT);
      area.appendChild(block);
    });

    // ── Arrows ──
    // SVG coordinate space: x is relative to the grid (same as gridX)
    //                        y is relative to tracksArea top
    for (let si = 0; si < rendered.length - 1; si++) {
      const cur  = rendered[si];
      const next = rendered[si + 1];
      if (!cur || !next) continue;

      // Arrow from RIGHT-CENTER of current block to LEFT-CENTER of next block
      // Both in SVG space (which starts at left=LW, top=0 of tracksArea)
      const x1 = cur.gridX  + cur.w;         // right edge of current block in grid coords
      const y1 = cur.rowY   + ROW_H / 2;     // vertical center of current track

      const x2 = next.gridX;                  // left edge of next block in grid coords
      const y2 = next.rowY  + ROW_H / 2;     // vertical center of next track

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');

      let d;
      if (Math.abs(x2 - x1) < 2) {
        // Nearly same x → straight vertical line
        d = `M${x1},${y1} L${x2},${y2}`;
      } else if (cur.ti === next.ti) {
        // Same track → straight horizontal
        d = `M${x1},${y1} L${x2},${y2}`;
      } else {
        // S-curve: leave horizontally then arrive horizontally
        const mx = (x1 + x2) / 2;
        d = `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`;
      }

      path.setAttribute('d', d);
      path.setAttribute('stroke', ka.warna);
      path.setAttribute('stroke-width', '2.5');
      path.setAttribute('fill', 'none');
      path.setAttribute('opacity', '0.92');
      path.setAttribute('marker-end', 'url(#arr)');
      svg.appendChild(path);
    }
  });

  renderSidebar();
}

function contrast(h) {
  const r = parseInt(h.slice(1,3),16), g = parseInt(h.slice(3,5),16), b = parseInt(h.slice(5,7),16);
  return (0.299*r + 0.587*g + 0.114*b) > 145 ? '#0a0c10' : '#ffffff';
}

// ══════════════════════════════════════════
// TOOLTIP
// ══════════════════════════════════════════
function showTT(e, ka, isCF) {
  const tt = document.getElementById('tooltip');
  document.getElementById('ttName').textContent  = ka.nama;
  document.getElementById('ttJ1').textContent    = `Jalur ${ka.seg1Jalur} (${fmt(ka.seg1Dari)}–${fmt(ka.seg1Sampai)})`;
  document.getElementById('ttCuci').textContent  = `${ka.seg2Cuci} (${fmt(ka.seg2Dari)}–${fmt(ka.seg2Sampai)})`;
  document.getElementById('ttJ2').textContent    = `Jalur ${ka.seg3Jalur} (${fmt(ka.seg3Dari)}–${fmt(ka.seg3Sampai)})`;
  document.getElementById('ttCf').style.display  = isCF ? 'block' : 'none';
  tt.style.left = (e.clientX + 16) + 'px';
  tt.style.top  = (e.clientY - 14) + 'px';
  tt.classList.add('show');
}
function hideTT() { document.getElementById('tooltip').classList.remove('show'); }

// ══════════════════════════════════════════
// SIDEBAR — KA LIST
// ══════════════════════════════════════════
function renderSidebar() {
  const list = document.getElementById('kaList');
  // Remember open edit forms
  const openEdits = new Set();
  list.querySelectorAll('.ka-edit-form.open').forEach(f => openEdits.add(+f.dataset.id));

  list.innerHTML = '';
  document.getElementById('kaCount').textContent = kaData.length + ' KA';

  kaData.forEach((ka, idx) => {
    const isCF = !!conflicts[ka.id];
    const item = document.createElement('div');
    item.className = 'ka-item';
    item.dataset.id = ka.id;
    item.draggable = true;

    // Head row
    const head = document.createElement('div');
    head.className = 'ka-item-head';
    head.innerHTML = `
      <span class="drag-handle" title="Geser untuk urutkan">⠿</span>
      <span class="ka-dot" style="background:${ka.warna}"></span>
      <span class="ka-item-name">${ka.nama}</span>
      <span class="ka-item-time">${fmt(ka.seg1Dari)}</span>
      ${isCF ? '<span class="ka-cf-badge">CF</span>' : ''}
    `;

    // Buttons
    const btns = document.createElement('div');
    btns.className = 'ka-item-btns';
    const editBtn = document.createElement('button');
    editBtn.className = 'btn btn-edit-toggle btn-sm' + (openEdits.has(ka.id) ? ' active' : '');
    editBtn.textContent = '✎ Edit';
    const delBtn = document.createElement('button');
    delBtn.className = 'btn btn-del btn-sm';
    delBtn.textContent = '✕ Hapus';
    delBtn.onclick = () => hapus(ka.id);
    btns.appendChild(editBtn);
    btns.appendChild(delBtn);

    // Inline edit form
    const form = document.createElement('div');
    form.className = 'ka-edit-form' + (openEdits.has(ka.id) ? ' open' : '');
    form.dataset.id = ka.id;
    form.innerHTML = buildEditFormHTML(ka);

    editBtn.onclick = () => {
      const isOpen = form.classList.contains('open');
      form.classList.toggle('open', !isOpen);
      editBtn.classList.toggle('active', !isOpen);
    };

    item.appendChild(head);
    item.appendChild(btns);
    item.appendChild(form);

    item.querySelector('.ef-save-btn').onclick   = () => saveEdit(ka.id, item);
    item.querySelector('.ef-cancel-btn').onclick = () => {
      form.classList.remove('open');
      editBtn.classList.remove('active');
    };

    // Drag & drop
    item.addEventListener('dragstart', e => {
      dragId = ka.id;
      setTimeout(() => item.classList.add('dragging'), 0);
      e.dataTransfer.effectAllowed = 'move';
    });
    item.addEventListener('dragend', () => {
      item.classList.remove('dragging');
      document.querySelectorAll('.ka-item').forEach(el => el.classList.remove('drag-over'));
      dragId = null;
    });
    item.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (dragId === ka.id) return;
      document.querySelectorAll('.ka-item').forEach(el => el.classList.remove('drag-over'));
      item.classList.add('drag-over');
    });
    item.addEventListener('drop', e => {
      e.preventDefault();
      if (dragId === null || dragId === ka.id) return;
      const fromIdx = kaData.findIndex(k => k.id === dragId);
      const toIdx   = idx;
      if (fromIdx < 0 || fromIdx === toIdx) return;
      const [moved] = kaData.splice(fromIdx, 1);
      kaData.splice(toIdx, 0, moved);
      renderAll();
    });

    list.appendChild(item);
  });
}

let dragId = null;

      <div class="fg"><lbl>Sampai</lbl><input class="ef-ti" name="s1s" type="text" value="${fmt(ka.seg1Sampai)}"/></div>
    </div></div>

    <div class="ef-row">
      <div class="fg"><lbl>Cuci</lbl><select class="ef-select" name="cuci" style="width:70px;">${co(ka.seg2Cuci)}</select></div>
      <div class="fg"><lbl>Dari</lbl><input class="ef-ti" name="s2d" type="text" value="${fmt(ka.seg2Dari)}"/></div>
      <div class="fg"><lbl>Sampai</lbl><input class="ef-ti" name="s2s" type="text" value="${fmt(ka.seg2Sampai)}"/></div>
    </div></div>
  <div class="ef-seg"><div class="ef-seg-lbl">③ Kembali ke Jalur</div>
    <div class="ef-row">
      <div class="fg"><lbl>Jalur</lbl><select class="ef-select" name="j3" style="width:56px;">${jo(ka.seg3Jalur)}</select></div>
      <div class="fg"><lbl>Dari</lbl><input class="ef-ti" name="s3d" type="text" value="${fmt(ka.seg3Dari)}"/></div>
      <div class="fg"><lbl>Berangkat</lbl><input class="ef-ti" name="s3s" type="text" value="${fmt(ka.seg3Sampai)}"/></div>
    </div></div>
  <div class="ef-btns">
    <button class="btn btn-primary ef-save-btn" style="flex:1;">💾 Simpan</button>
    <button class="btn btn-ghost btn-sm ef-cancel-btn">Batal</button>
  </div>`;
}

function saveEdit(id, itemEl) {
  const f = itemEl.querySelector('.ka-edit-form');
  const g = name => f.querySelector(`[name="${name}"]`).value;
  const vals = ['s1d','s1s','s2d','s2s','s3d','s3s'].map(n => parseT(g(n)));
  if (vals.some(v => v === null)) { alert('Format waktu harus HH:MM'); return; }
  const [s1d,s1s,s2d,s2s,s3d,s3s] = vals;
  if (s1d >= s1s || s2d >= s2s || s3d >= s3s) { alert('Waktu Dari harus < Sampai/Berangkat'); return; }
  const nama = g('nama').trim();
  if (!nama) { alert('Nama KA harus diisi!'); return; }
  const idx = kaData.findIndex(k => k.id === id);
  if (idx >= 0) kaData[idx] = { ...kaData[idx], nama, warna: g('warna'),
    seg1Jalur: g('j1'), seg1Dari: s1d, seg1Sampai: s1s,
    seg2Cuci:  g('cuci'), seg2Dari: s2d, seg2Sampai: s2s,
    seg3Jalur: g('j3'), seg3Dari: s3d, seg3Sampai: s3s };
  renderAll();
}

function hapus(id) {
  if (!confirm('Hapus KA ini?')) return;
  kaData = kaData.filter(k => k.id !== id);
  renderAll();
}

// ADD FORM

let addFormOpen = false;
function toggleAddForm() {
  addFormOpen = !addFormOpen;
  document.getElementById('addForm').classList.toggle('open', addFormOpen);
}
function doAdd() {
  const g  = id => document.getElementById(id).value;
  const vals = ['a_s1d','a_s1s','a_s2d','a_s2s','a_s3d','a_s3s'].map(id => parseT(g(id)));
  if (vals.some(v => v === null)) { alert('Format waktu harus HH:MM'); return; }
  const [s1d,s1s,s2d,s2s,s3d,s3s] = vals;
  if (s1d >= s1s)  { alert('Segmen 1: Dari < Sampai'); return; }
  if (s2d >= s2s)  { alert('Segmen 2: Dari < Sampai'); return; }
  if (s3d >= s3s)  { alert('Segmen 3: Dari < Berangkat'); return; }
  const nama = g('a_nama').trim();
  if (!nama) { alert('Nama KA harus diisi!'); return; }
  kaData.push({ id: Date.now(), nama, warna: g('a_warna'),
    seg1Jalur: g('a_j1'), seg1Dari: s1d, seg1Sampai: s1s,
    seg2Cuci:  g('a_cuci'), seg2Dari: s2d, seg2Sampai: s2s,
    seg3Jalur: g('a_j3'), seg3Dari: s3d, seg3Sampai: s3s });
  document.getElementById('a_nama').value = '';
  addFormOpen = false;
  document.getElementById('addForm').classList.remove('open');
  renderAll();
}

// ══════════════════════════════════════════
// SAVE / LOAD / EXPORT
// ══════════════════════════════════════════
function exportJSON() {
  // Always serialize times as "HH:MM" strings for reliable round-trip
  const exportData = kaData.map(k => ({
    id:         k.id,
    nama:       k.nama,
    warna:      k.warna,
    seg1Jalur:  k.seg1Jalur,
    seg1Dari:   fmt(k.seg1Dari),
    seg1Sampai: fmt(k.seg1Sampai),
    seg2Cuci:   k.seg2Cuci,
    seg2Dari:   fmt(k.seg2Dari),
    seg2Sampai: fmt(k.seg2Sampai),
    seg3Jalur:  k.seg3Jalur,
    seg3Dari:   fmt(k.seg3Dari),
    seg3Sampai: fmt(k.seg3Sampai),
  }));
  const payload = { v: 4, savedAt: new Date().toISOString(), kaData: exportData };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'garis-waktu-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  // brief visual confirmation in the badge area
  showSaveConfirm();
}

function showSaveConfirm() {
  const btn = document.querySelector('[onclick="exportJSON()"]');
  if (!btn) return;
  const orig = btn.textContent;
  btn.textContent = '✓ Tersimpan!';
  btn.style.color = 'var(--grn)';
  setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 2000);
}

function importJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = ''; // reset so same file can be re-opened

  const r = new FileReader();
  r.onerror = () => alert('Gagal membaca file.');
  r.onload = ev => {
    let obj;
    try { obj = JSON.parse(ev.target.result); }
    catch { alert('File bukan JSON yang valid.'); return; }

    // Accept both {v, kaData:[...]} and plain array
    const raw = Array.isArray(obj) ? obj
              : Array.isArray(obj.kaData) ? obj.kaData
              : null;
    if (!raw || raw.length === 0) {
      alert('File tidak berisi data KA yang dapat dibaca.'); return;
    }

    // Robust time converter: handles "HH:MM" strings, minute-integers, hour-floats
    const toMins = v => {
      if (v == null) return 0;
      if (typeof v === 'string') {
        const p = parseT(v);
        return p !== null ? p : 0;
      }
      if (typeof v === 'number') {
        // heuristic: if ≤ 24 it was saved as hours (old format)
        return v <= 24 ? Math.round(v * 60) : Math.round(v);
      }
      return 0;
    };

    const validJalur = new Set(['I','II','III','IV','V','VI']);
    const validCuci  = new Set(['CUCI 1','CUCI 2']);

    const loaded = raw.map((k, i) => ({
      id:         k.id        || (Date.now() + i),
      nama:       (k.nama     || '?').toString(),
      warna:      /^#[0-9a-fA-F]{6}$/.test(k.warna) ? k.warna : '#888888',
      seg1Jalur:  validJalur.has(k.seg1Jalur) ? k.seg1Jalur : 'I',
      seg1Dari:   toMins(k.seg1Dari),
      seg1Sampai: toMins(k.seg1Sampai),
      seg2Cuci:   validCuci.has(k.seg2Cuci) ? k.seg2Cuci : 'CUCI 1',
      seg2Dari:   toMins(k.seg2Dari),
      seg2Sampai: toMins(k.seg2Sampai),
      seg3Jalur:  validJalur.has(k.seg3Jalur) ? k.seg3Jalur : 'I',
      seg3Dari:   toMins(k.seg3Dari),
      seg3Sampai: toMins(k.seg3Sampai),
    }));

    // Sanity check: at least one segment must have valid duration
    const valid = loaded.filter(k =>
      k.seg1Dari < k.seg1Sampai ||
      k.seg2Dari < k.seg2Sampai ||
      k.seg3Dari < k.seg3Sampai
    );
    if (valid.length === 0) {
      alert('Semua data KA di file tampak tidak valid (waktu salah).'); return;
    }

    kaData = loaded;
    rebuildGrid();
    renderAll();

    // confirmation
    const lbl = document.querySelector('[onchange="importJSON(event)"]')?.parentElement;
    if (lbl) {
      const orig = lbl.childNodes[0]?.textContent || '📂 Buka';
      lbl.childNodes[0].textContent = `✓ ${kaData.length} KA`;
      lbl.style.color = 'var(--grn)';
      setTimeout(() => { lbl.childNodes[0].textContent = orig; lbl.style.color = ''; }, 2500);
    }
  };
  r.readAsText(file);
}
function exportPNG() {
  const inner  = document.getElementById('tlInner');
  const scroll = document.getElementById('tlScroll');
  const origOF = scroll.style.overflow;
  scroll.style.overflow = 'visible';
  html2canvas(inner, {
    backgroundColor: '#0a0c10', scale: 2, useCORS: true,
    width: inner.scrollWidth, height: inner.scrollHeight,
  }).then(canvas => {
    scroll.style.overflow = origOF;
    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = 'garis-waktu-' + new Date().toISOString().slice(0,10) + '.png';
    a.click();
  }).catch(() => { scroll.style.overflow = origOF; alert('Export gagal.'); });
}
