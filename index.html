<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GARIS WAKTU — Jadwal Langsir Kereta</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700;800&display=swap');

:root{
  --bg:#0a0c10;--surface:#11141a;--surface2:#181c24;--border:#2a2f3d;
  --accent:#f0b429;--accent2:#00c2ff;--red:#ef4444;--green:#22c55e;
  --text:#e8eaf0;--dim:#6b7280;--grid:#1e2330;
  --LW:80px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Barlow Condensed',sans-serif;}

/* ═══ HEADER ═══ */
header{
  height:52px;background:linear-gradient(135deg,#0f1218,#181c28);
  border-bottom:2px solid var(--accent);padding:0 16px;
  display:flex;align-items:center;gap:12px;flex-shrink:0;
  box-shadow:0 4px 20px rgba(0,0,0,.5);z-index:200;position:relative;
}
.logo{width:28px;height:28px;background:var(--accent);
  clip-path:polygon(0 20%,40% 0,100% 0,100% 80%,60% 100%,0 100%);
  display:flex;align-items:center;justify-content:center;font-size:13px;}
header h1{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;
  letter-spacing:3px;color:var(--accent);text-transform:uppercase;}
.htools{margin-left:auto;display:flex;gap:6px;align-items:center;}
#clock{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--dim);margin-right:4px;}
#conflictBadge{display:none;background:var(--red);color:#fff;font-size:10px;font-weight:700;
  letter-spacing:1px;padding:3px 9px;border-radius:20px;cursor:pointer;}
#conflictBadge.show{display:block;}
.zoom-ctrl{display:flex;gap:3px;align-items:center;}
.zoom-lbl{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--dim);min-width:34px;text-align:center;}

/* ═══ APP SHELL ═══ */
.app{display:flex;flex-direction:column;height:calc(100vh - 52px);}

/* ═══ TIMELINE — horizontal scroll only, vertical fills ═══ */
.tl-wrap{
  flex:1;min-height:0;
  overflow-x:auto;overflow-y:hidden;
  position:relative;
}
.tl-inner{
  display:flex;flex-direction:column;
  height:100%;
  /* min-width set by JS */
}

/* Hour header */
.tl-head{
  display:flex;height:42px;flex-shrink:0;
  background:var(--surface);border-bottom:2px solid var(--border);
  position:sticky;top:0;z-index:30;
}
.corner{
  width:var(--LW);min-width:var(--LW);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;letter-spacing:2px;color:var(--accent);
  border-right:2px solid var(--border);background:var(--surface2);text-transform:uppercase;
}
#hourCells{display:flex;}
.hcell{
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--dim);
  border-right:1px solid var(--border);
}
.hcell.major{color:var(--text);border-right-color:var(--border);}
.hcell.minor{color:var(--dim);border-right-color:var(--grid);}

/* Tracks — fills remaining height, split equally */
.tracks-area{
  flex:1;min-height:0;
  position:relative;display:flex;flex-direction:column;
}
.track-row{
  flex:1;min-height:0;
  display:flex;border-bottom:1px solid var(--grid);position:relative;
}
.track-row.cuci .track-label{background:rgba(0,194,255,.07);color:var(--accent2);}
.track-label{
  width:var(--LW);min-width:var(--LW);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:12px;letter-spacing:1.5px;color:var(--accent);
  background:var(--surface2);border-right:2px solid var(--border);
  position:sticky;left:0;z-index:10;text-transform:uppercase;
}
.track-grid{position:relative;flex:1;display:flex;}
.gcell{border-right:1px solid var(--grid);height:100%;flex-shrink:0;}
.gcell.maj{border-right-color:var(--border);}

/* ═══ BLOCKS & SVG ═══ */
.ka-block{
  position:absolute;top:3px;
  border-radius:3px;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;
  cursor:pointer;pointer-events:all;
  border:1px solid rgba(255,255,255,.18);
  box-shadow:0 2px 8px rgba(0,0,0,.4);
  transition:filter .15s,box-shadow .15s;z-index:5;
}
.ka-block:hover{filter:brightness(1.18);box-shadow:0 0 0 2px rgba(255,255,255,.4),0 4px 14px rgba(0,0,0,.5);z-index:20;}
.ka-block.conflict{box-shadow:0 0 0 2px var(--red),0 0 12px rgba(239,68,68,.4)!important;}
.ka-block span{padding:0 5px;text-shadow:0 1px 3px rgba(0,0,0,.6);pointer-events:none;}
#arrowSvg{position:absolute;top:0;left:0;pointer-events:none;z-index:8;overflow:visible;}

/* ═══ TOOLTIP ═══ */
.tooltip{
  position:fixed;background:#1a1f2e;border:1px solid var(--accent);
  padding:10px 14px;border-radius:6px;pointer-events:none;display:none;
  z-index:500;box-shadow:0 8px 32px rgba(0,0,0,.6);min-width:200px;font-size:13px;
}
.tooltip.show{display:block;}
.tt-name{font-size:15px;font-weight:700;color:var(--accent);margin-bottom:5px;}
.tt-row{font-size:12px;color:var(--dim);margin-bottom:2px;}
.tt-row b{color:var(--text);font-weight:600;}
.tt-cf{color:var(--red);font-size:11px;margin-top:4px;font-weight:700;display:none;}

/* ═══ CONFLICT PANEL ═══ */
.cf-panel{
  position:fixed;top:60px;right:14px;width:270px;
  background:var(--surface);border:1px solid var(--red);border-radius:8px;
  padding:12px;z-index:400;display:none;
  box-shadow:0 8px 32px rgba(0,0,0,.6);
}
.cf-panel.open{display:block;}
.cf-title{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--red);margin-bottom:8px;}
.cf-item{font-size:12px;padding:4px 0;border-bottom:1px solid var(--grid);color:var(--dim);}
.cf-item b{color:var(--text);}

/* ═══ BOTTOM PANEL ═══ */
.panel{background:var(--surface);border-top:2px solid var(--border);padding:10px 16px;flex-shrink:0;}
.panel-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.panel-title{font-size:10px;font-weight:700;letter-spacing:3px;color:var(--accent);text-transform:uppercase;}
.panel-head::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--border),transparent);}
.form-row{display:flex;gap:7px;align-items:flex-end;flex-wrap:wrap;}
.fg{display:flex;flex-direction:column;gap:3px;}
label{font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;}
input[type=text],select{
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
  font-family:'Barlow Condensed',sans-serif;font-size:14px;
  padding:5px 8px;border-radius:4px;outline:none;transition:border-color .2s;
}
input:focus,select:focus{border-color:var(--accent);}
input[type=color]{width:42px;height:30px;border:1px solid var(--border);border-radius:4px;
  background:var(--surface2);cursor:pointer;padding:2px;}
.ti{width:68px;background:var(--surface2);border:1px solid var(--border);color:var(--text);
  font-family:'Share Tech Mono',monospace;font-size:13px;padding:5px 7px;border-radius:4px;outline:none;transition:border-color .2s;}
.ti:focus{border-color:var(--accent);}
.seg{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;display:flex;flex-direction:column;gap:5px;}
.seg-lbl{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--dim);text-transform:uppercase;}
select option{background:#1a1f2e;}
.btn{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;letter-spacing:1.5px;
  text-transform:uppercase;border:none;cursor:pointer;padding:6px 14px;border-radius:4px;transition:all .2s;white-space:nowrap;}
.btn-primary{background:var(--accent);color:#0a0c10;}
.btn-primary:hover{background:#ffca50;transform:translateY(-1px);}
.btn-sm{padding:3px 8px;font-size:10px;}
.btn-edit{background:transparent;border:1px solid var(--accent2);color:var(--accent2);}
.btn-edit:hover{background:var(--accent2);color:#0a0c10;}
.btn-del{background:transparent;border:1px solid var(--red);color:var(--red);}
.btn-del:hover{background:var(--red);color:#fff;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--dim);}
.btn-ghost:hover{border-color:var(--text);color:var(--text);}
.ka-list{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px;max-height:60px;overflow-y:auto;}
.ka-chip{display:flex;align-items:center;gap:4px;background:var(--surface2);
  border:1px solid var(--border);border-radius:20px;padding:2px 7px 2px 5px;font-size:11px;}
.ka-chip.cf{border-color:var(--red);}
.chip-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.chip-info{color:var(--dim);font-size:10px;}
#btnBatal{display:none;}

/* scrollbar */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
#emptyHint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;color:var(--dim);pointer-events:none;}
#emptyHint .big{font-size:34px;opacity:.12;margin-bottom:5px;}
</style>
</head>
<body>

<header>
  <div class="logo">🚂</div>
  <h1>Garis Waktu Langsir</h1>
  <div class="htools">
    <span id="clock">—</span>
    <div id="conflictBadge" onclick="toggleCF()">⚠ KONFLIK</div>
    <div class="zoom-ctrl">
      <button class="btn btn-ghost btn-sm" onclick="zoom(-1)">−</button>
      <span class="zoom-lbl" id="zoomLbl">60m</span>
      <button class="btn btn-ghost btn-sm" onclick="zoom(1)">+</button>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="exportPNG()">📷 PNG</button>
    <button class="btn btn-ghost btn-sm" onclick="exportJSON()">💾 Simpan</button>
    <label class="btn btn-ghost btn-sm" style="cursor:pointer;">
      📂 Buka<input type="file" accept=".json" style="display:none" onchange="importJSON(event)">
    </label>
  </div>
</header>

<div class="app">
  <!-- TIMELINE -->
  <div class="tl-wrap" id="tlWrap">
    <div class="tl-inner" id="tlInner">
      <div class="tl-head">
        <div class="corner">JALUR</div>
        <div id="hourCells"></div>
      </div>
      <div class="tracks-area" id="tracksArea">
        <div id="emptyHint"><div class="big">⏱</div>Tambah KA di bawah</div>
      </div>
      <svg id="arrowSvg"></svg>
    </div>
  </div>

  <!-- PANEL INPUT -->
  <div class="panel">
    <div class="panel-head">
      <div class="panel-title" id="panelTitle">Tambah Kereta Api</div>
    </div>
    <div class="form-row">
      <div class="fg" style="min-width:110px;">
        <label>Nama KA</label>
        <input type="text" id="f_nama" placeholder="mis. 491/492"/>
      </div>
      <div class="fg">
        <label>Warna</label>
        <input type="color" id="f_warna" value="#4ade80"/>
      </div>

      <div class="seg">
        <div class="seg-lbl">① Masuk Jalur</div>
        <div class="form-row">
          <div class="fg"><label>Jalur</label>
            <select id="f_j1"><option>I</option><option>II</option><option>III</option><option>IV</option><option>V</option><option>VI</option></select>
          </div>
          <div class="fg"><label>Dari</label><input class="ti" id="f_s1d" type="text" placeholder="HH:MM" value="00:00"/></div>
          <div class="fg"><label>Sampai</label><input class="ti" id="f_s1s" type="text" placeholder="HH:MM" value="04:00"/></div>
        </div>
      </div>

      <div class="seg">
        <div class="seg-lbl">② Jalur Cuci</div>
        <div class="form-row">
          <div class="fg"><label>Cuci</label>
            <select id="f_cuci"><option>CUCI 1</option><option>CUCI 2</option></select>
          </div>
          <div class="fg"><label>Dari</label><input class="ti" id="f_s2d" type="text" placeholder="HH:MM" value="04:00"/></div>
          <div class="fg"><label>Sampai</label><input class="ti" id="f_s2s" type="text" placeholder="HH:MM" value="06:00"/></div>
        </div>
      </div>

      <div class="seg">
        <div class="seg-lbl">③ Kembali ke Jalur</div>
        <div class="form-row">
          <div class="fg"><label>Jalur</label>
            <select id="f_j3"><option>I</option><option>II</option><option>III</option><option>IV</option><option>V</option><option>VI</option></select>
          </div>
          <div class="fg"><label>Dari</label><input class="ti" id="f_s3d" type="text" placeholder="HH:MM" value="06:00"/></div>
          <div class="fg"><label>Berangkat</label><input class="ti" id="f_s3s" type="text" placeholder="HH:MM" value="10:00"/></div>
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:4px;">
        <button class="btn btn-primary" id="btnSubmit" onclick="submitForm()">＋ Tambah</button>
        <button class="btn btn-ghost btn-sm" id="btnBatal" onclick="cancelEdit()">Batal Edit</button>
      </div>
    </div>
    <div class="ka-list" id="kaList"></div>
  </div>
</div>

<!-- CONFLICT PANEL -->
<div class="cf-panel" id="cfPanel">
  <div class="cf-title">⚠ KONFLIK JALUR</div>
  <div id="cfList"></div>
</div>

<!-- TOOLTIP -->
<div class="tooltip" id="tooltip">
  <div class="tt-name" id="ttName"></div>
  <div class="tt-row">Jalur awal: <b id="ttJ1"></b></div>
  <div class="tt-row">Cuci: <b id="ttCuci"></b></div>
  <div class="tt-row">Jalur akhir: <b id="ttJ2"></b></div>
  <div class="tt-cf" id="ttCf">⚠ Konflik di jalur ini!</div>
</div>

<script>
// ══════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════
const TRACKS=['I','II','III','IV','V','VI','CUCI 1','CUCI 2'];
const CUCI=['CUCI 1','CUCI 2'];
const TOTAL=1440; // total minutes in a day
const ZOOM=[60,30,15]; // minutes per column
const COL_W=44; // px per column (fixed)
const LW=80; // label width px

let kaData=[];
let zoomIdx=0;
let editId=null;
let conflicts={};

// ══════════════════════════════════════
// TIME UTILS
// ══════════════════════════════════════
function parseT(s){
  if(s==null)return null;
  const p=String(s).split(':');
  if(p.length===2){const h=+p[0],m=+p[1];if(!isNaN(h)&&!isNaN(m))return Math.max(0,Math.min(TOTAL,h*60+m));}
  // legacy: bare number treated as hours
  const n=+s;if(!isNaN(n)&&n<=24)return n*60;
  return null;
}
function fmt(m){return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0');}
function minX(mins){return LW+(mins/ZOOM[zoomIdx])*COL_W;}

// ══════════════════════════════════════
// ZOOM
// ══════════════════════════════════════
function zoom(d){
  zoomIdx=Math.max(0,Math.min(ZOOM.length-1,zoomIdx+d));
  document.getElementById('zoomLbl').textContent=ZOOM[zoomIdx]+'m';
  rebuildGrid();renderAll();
}

// ══════════════════════════════════════
// BUILD GRID (header + track rows)
// ══════════════════════════════════════
function rebuildGrid(){
  const mpc=ZOOM[zoomIdx];
  const cols=TOTAL/mpc;
  const totalW=LW+cols*COL_W;
  document.getElementById('tlInner').style.minWidth=totalW+'px';

  // Hour cells
  const hc=document.getElementById('hourCells');hc.innerHTML='';
  for(let c=0;c<cols;c++){
    const mins=c*mpc;
    const el=document.createElement('div');
    el.className='hcell '+(mpc===60||mins%60===0?'major':'minor');
    el.style.width=COL_W+'px';el.style.minWidth=COL_W+'px';
    if(mpc===60) el.textContent=String(mins/60).padStart(2,'0');
    else if(mins%60===0) el.textContent=String(mins/60).padStart(2,'0');
    else el.textContent=':'+String(mins%60).padStart(2,'0');
    hc.appendChild(el);
  }

  // Track rows
  const area=document.getElementById('tracksArea');
  area.innerHTML='<div id="emptyHint"><div class="big">⏱</div>Tambah KA di bawah</div>';
  TRACKS.forEach(tr=>{
    const row=document.createElement('div');
    row.className='track-row'+(CUCI.includes(tr)?' cuci':'');
    row.dataset.track=tr;
    const lbl=document.createElement('div');
    lbl.className='track-label';lbl.textContent=tr;
    const grid=document.createElement('div');
    grid.className='track-grid';
    for(let c=0;c<cols;c++){
      const mins=c*mpc;
      const cell=document.createElement('div');
      cell.className='gcell'+(mins%60===0?' maj':'');
      cell.style.width=COL_W+'px';cell.style.minWidth=COL_W+'px';
      grid.appendChild(cell);
    }
    row.appendChild(lbl);row.appendChild(grid);
    area.appendChild(row);
  });
}

// ══════════════════════════════════════
// CONFLICT DETECTION
// ══════════════════════════════════════
function detectConflicts(){
  conflicts={};const cfList=[];
  const byTrack={};TRACKS.forEach(t=>byTrack[t]=[]);
  kaData.forEach(ka=>{
    [{track:ka.seg1Jalur,from:ka.seg1Dari,to:ka.seg1Sampai},
     {track:ka.seg2Cuci, from:ka.seg2Dari,to:ka.seg2Sampai},
     {track:ka.seg3Jalur,from:ka.seg3Dari,to:ka.seg3Sampai}]
    .forEach(s=>{if(byTrack[s.track])byTrack[s.track].push({kaId:ka.id,nama:ka.nama,from:s.from,to:s.to});});
  });
  TRACKS.forEach(track=>{
    const segs=byTrack[track];
    for(let i=0;i<segs.length;i++)for(let j=i+1;j<segs.length;j++){
      if(segs[i].from<segs[j].to&&segs[j].from<segs[i].to){
        conflicts[segs[i].kaId]=true;conflicts[segs[j].kaId]=true;
        cfList.push({track,a:segs[i].nama,b:segs[j].nama,
          t:fmt(Math.max(segs[i].from,segs[j].from))+'–'+fmt(Math.min(segs[i].to,segs[j].to))});
      }
    }
  });
  document.getElementById('conflictBadge').classList.toggle('show',cfList.length>0);
  document.getElementById('cfList').innerHTML=cfList.length
    ? cfList.map(c=>`<div class="cf-item">Jalur <b>${c.track}</b>: <b>${c.a}</b> & <b>${c.b}</b><br><span style="font-size:10px;opacity:.7">${c.t}</span></div>`).join('')
    : '<div class="cf-item" style="color:var(--green)">✓ Tidak ada konflik</div>';
}
function toggleCF(){document.getElementById('cfPanel').classList.toggle('open');}

// ══════════════════════════════════════
// RENDER BLOCKS + ARROWS
// ══════════════════════════════════════
function renderAll(){
  detectConflicts();
  document.querySelectorAll('.ka-block').forEach(e=>e.remove());

  const area=document.getElementById('tracksArea');
  const areaH=area.clientHeight||TRACKS.length*36;
  const rowH=areaH/TRACKS.length;
  const mpc=ZOOM[zoomIdx];
  const cols=TOTAL/mpc;
  const svgW=cols*COL_W;

  const svg=document.getElementById('arrowSvg');
  svg.setAttribute('width',svgW);svg.setAttribute('height',areaH);
  svg.style.left=LW+'px';svg.style.width=svgW+'px';svg.style.height=areaH+'px';
  svg.innerHTML=`<defs><marker id="arr" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
    <path d="M0,0 L7,3.5 L0,7 Z" fill="rgba(255,255,255,.9)"/></marker></defs>`;

  document.getElementById('emptyHint').style.display=kaData.length?'none':'block';

  kaData.forEach(ka=>{
    const segs=[
      {track:ka.seg1Jalur,from:ka.seg1Dari,to:ka.seg1Sampai},
      {track:ka.seg2Cuci, from:ka.seg2Dari,to:ka.seg2Sampai},
      {track:ka.seg3Jalur,from:ka.seg3Dari,to:ka.seg3Sampai},
    ];
    const isCF=!!conflicts[ka.id];

    segs.forEach((seg,si)=>{
      if(seg.from>=seg.to)return;
      const ti=TRACKS.indexOf(seg.track);if(ti<0)return;
      const x=minX(seg.from)-LW;
      const w=(seg.to-seg.from)/mpc*COL_W;
      const y=ti*rowH;

      const block=document.createElement('div');
      block.className='ka-block'+(isCF?' conflict':'');
      block.style.cssText=`left:${x}px;width:${w}px;top:${y+3}px;height:${rowH-6}px;background:${ka.warna};color:${contrast(ka.warna)};`;
      const sp=document.createElement('span');sp.textContent=ka.nama;
      block.appendChild(sp);
      block.addEventListener('mousemove',e=>showTT(e,ka,isCF));
      block.addEventListener('mouseleave',hideTT);
      block.addEventListener('dblclick',()=>startEdit(ka.id));
      area.appendChild(block);

      if(si<segs.length-1){
        const nx=segs[si+1];if(nx.from>=nx.to)return;
        const nti=TRACKS.indexOf(nx.track);if(nti<0)return;
        const x1=x+w,y1=y+rowH/2;
        const x2=minX(nx.from)-LW,y2=nti*rowH+rowH/2;
        const mx=(x1+x2)/2;
        const path=document.createElementNS('http://www.w3.org/2000/svg','path');
        path.setAttribute('d',`M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`);
        path.setAttribute('stroke',ka.warna);path.setAttribute('stroke-width','2');
        path.setAttribute('fill','none');path.setAttribute('opacity','0.9');
        path.setAttribute('marker-end','url(#arr)');
        svg.appendChild(path);
      }
    });
  });
  renderChips();
}

function contrast(h){
  const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return(0.299*r+0.587*g+0.114*b)>140?'#0a0c10':'#ffffff';
}

// ══════════════════════════════════════
// CHIP LIST
// ══════════════════════════════════════
function renderChips(){
  const list=document.getElementById('kaList');list.innerHTML='';
  kaData.forEach(ka=>{
    const isCF=!!conflicts[ka.id];
    const c=document.createElement('div');
    c.className='ka-chip'+(isCF?' cf':'');
    c.innerHTML=`<div class="chip-dot" style="background:${ka.warna}"></div>
      <span>${ka.nama}</span>
      <span class="chip-info">${fmt(ka.seg1Dari)}–${fmt(ka.seg1Sampai)}→${ka.seg2Cuci.replace('CUCI ','C')}→${fmt(ka.seg3Dari)}–${fmt(ka.seg3Sampai)}</span>
      <button class="btn btn-edit btn-sm" onclick="startEdit(${ka.id})">✎</button>
      <button class="btn btn-del btn-sm" onclick="hapus(${ka.id})">✕</button>`;
    list.appendChild(c);
  });
}

// ══════════════════════════════════════
// FORM
// ══════════════════════════════════════
function readForm(){
  const vals=['f_s1d','f_s1s','f_s2d','f_s2s','f_s3d','f_s3s'].map(id=>parseT(document.getElementById(id).value));
  if(vals.some(v=>v===null)){alert('Format waktu harus HH:MM — contoh: 08:30');return null;}
  const [s1d,s1s,s2d,s2s,s3d,s3s]=vals;
  if(s1d>=s1s){alert('Segmen 1: Dari < Sampai');return null;}
  if(s2d>=s2s){alert('Segmen 2: Dari < Sampai');return null;}
  if(s3d>=s3s){alert('Segmen 3: Dari < Berangkat');return null;}
  return{
    nama:document.getElementById('f_nama').value.trim(),
    warna:document.getElementById('f_warna').value,
    seg1Jalur:document.getElementById('f_j1').value,seg1Dari:s1d,seg1Sampai:s1s,
    seg2Cuci:document.getElementById('f_cuci').value,seg2Dari:s2d,seg2Sampai:s2s,
    seg3Jalur:document.getElementById('f_j3').value,seg3Dari:s3d,seg3Sampai:s3s,
  };
}

function fillForm(ka){
  document.getElementById('f_nama').value=ka.nama;
  document.getElementById('f_warna').value=ka.warna;
  document.getElementById('f_j1').value=ka.seg1Jalur;
  document.getElementById('f_s1d').value=fmt(ka.seg1Dari);
  document.getElementById('f_s1s').value=fmt(ka.seg1Sampai);
  document.getElementById('f_cuci').value=ka.seg2Cuci;
  document.getElementById('f_s2d').value=fmt(ka.seg2Dari);
  document.getElementById('f_s2s').value=fmt(ka.seg2Sampai);
  document.getElementById('f_j3').value=ka.seg3Jalur;
  document.getElementById('f_s3d').value=fmt(ka.seg3Dari);
  document.getElementById('f_s3s').value=fmt(ka.seg3Sampai);
}

function submitForm(){
  const d=readForm();if(!d)return;
  if(!d.nama){alert('Nama KA harus diisi!');return;}
  if(editId!==null){
    const idx=kaData.findIndex(k=>k.id===editId);
    if(idx>=0)kaData[idx]={...kaData[idx],...d};
    cancelEdit();
  }else{
    kaData.push({id:Date.now(),...d});
    document.getElementById('f_nama').value='';
  }
  renderAll();
}

function startEdit(id){
  const ka=kaData.find(k=>k.id===id);if(!ka)return;
  editId=id;fillForm(ka);
  document.getElementById('panelTitle').textContent='Edit KA — '+ka.nama;
  document.getElementById('btnSubmit').textContent='💾 Simpan';
  document.getElementById('btnBatal').style.display='';
}

function cancelEdit(){
  editId=null;
  document.getElementById('panelTitle').textContent='Tambah Kereta Api';
  document.getElementById('btnSubmit').textContent='＋ Tambah';
  document.getElementById('btnBatal').style.display='none';
  document.getElementById('f_nama').value='';
}

function hapus(id){
  if(!confirm('Hapus KA ini?'))return;
  kaData=kaData.filter(k=>k.id!==id);
  if(editId===id)cancelEdit();
  renderAll();
}

function showTT(e,ka,isCF){
  const tt=document.getElementById('tooltip');
  document.getElementById('ttName').textContent=ka.nama;
  document.getElementById('ttJ1').textContent=`Jalur ${ka.seg1Jalur} (${fmt(ka.seg1Dari)}–${fmt(ka.seg1Sampai)})`;
  document.getElementById('ttCuci').textContent=`${ka.seg2Cuci} (${fmt(ka.seg2Dari)}–${fmt(ka.seg2Sampai)})`;
  document.getElementById('ttJ2').textContent=`Jalur ${ka.seg3Jalur} (${fmt(ka.seg3Dari)}–${fmt(ka.seg3Sampai)})`;
  document.getElementById('ttCf').style.display=isCF?'block':'none';
  tt.style.left=(e.clientX+16)+'px';tt.style.top=(e.clientY-14)+'px';
  tt.classList.add('show');
}
function hideTT(){document.getElementById('tooltip').classList.remove('show');}

// ══════════════════════════════════════
// SAVE / LOAD / EXPORT
// ══════════════════════════════════════
function exportJSON(){
  const blob=new Blob([JSON.stringify({v:2,kaData},null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='garis-waktu-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
}

function importJSON(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const obj=JSON.parse(ev.target.result);
      let raw=obj.kaData||obj;
      // Migrate old hour-based format to minutes
      kaData=raw.map(k=>({...k,
        seg1Dari:parseT(k.seg1Dari)||k.seg1Dari*60,
        seg1Sampai:parseT(k.seg1Sampai)||k.seg1Sampai*60,
        seg2Dari:parseT(k.seg2Dari)||k.seg2Dari*60,
        seg2Sampai:parseT(k.seg2Sampai)||k.seg2Sampai*60,
        seg3Dari:parseT(k.seg3Dari)||k.seg3Dari*60,
        seg3Sampai:parseT(k.seg3Sampai)||k.seg3Sampai*60,
      }));
      rebuildGrid();renderAll();
    }catch{alert('File tidak valid!');}
  };
  r.readAsText(file);e.target.value='';
}

function exportPNG(){
  const inner=document.getElementById('tlInner');
  // Expand for full capture
  const wrap=document.getElementById('tlWrap');
  const origOF=wrap.style.overflow;
  wrap.style.overflow='visible';
  html2canvas(inner,{
    backgroundColor:'#0a0c10',scale:2,useCORS:true,
    width:inner.scrollWidth,height:inner.scrollHeight,
  }).then(canvas=>{
    wrap.style.overflow=origOF;
    const a=document.createElement('a');
    a.href=canvas.toDataURL('image/png');
    a.download='garis-waktu-'+new Date().toISOString().slice(0,10)+'.png';
    a.click();
  }).catch(()=>{wrap.style.overflow=origOF;alert('Export gagal.');});
}
